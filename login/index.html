<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Login</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(108,99,255,0.12), transparent 45%), #04050a; color: var(--text); font-family: var(--font); }
    .auth-shell { width: min(520px, calc(100vw - 2rem)); padding: 2rem; background: rgba(8,9,17,0.96); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; box-shadow: 0 30px 90px rgba(0,0,0,0.35); }
    .auth-header { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.75rem; }
    .auth-header h1 { margin: 0; font-family: var(--font-display); font-size: 2rem; letter-spacing: -0.04em; }
    .auth-header p { margin: 0; color: var(--text-muted); line-height: 1.65; }
    .auth-form { display: grid; gap: 1rem; }
    .input-group { display: grid; gap: 0.45rem; }
    .input-group label { font-size: 0.85rem; color: var(--text-muted); }
    .input-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 14px; font: inherit; }
    .input-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
    .auth-buttons { display: grid; gap: 0.85rem; }
    .auth-actions { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .auth-actions button { border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text); padding: 12px 16px; border-radius: 999px; cursor: pointer; }
    .auth-actions button:hover { border-color: rgba(108,99,255,0.3); }
    .hidden { display: none !important; }
  </style>
</head>

<body>

<main class="auth-shell">

  <div class="auth-header">
    <h1 id="auth-title">Sign in</h1>
  </div>

  <form id="auth-form" class="auth-form">

    <div id="name-field" class="input-group hidden">
      <label>Username</label>
      <input id="name" type="text" placeholder="Username">
    </div>

    <div class="input-group">
      <label>Email address</label>
      <input id="email" type="email" placeholder="you@example.com" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" required>
    </div>

    <div class="auth-buttons">
      <button type="submit" id="auth-submit" class="btn-primary">Sign in</button>
    </div>

    <div class="auth-actions">
      <span id="mode-text">Don’t have an account?</span>
      <button type="button" id="toggle-mode">Create account</button>
    </div>

  </form>

</main>

<script type="module">
/* ================= FIREBASE IMPORTS ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
  authDomain: "carson-games.firebaseapp.com",
  projectId: "carson-games",
  storageBucket: "carson-games.firebasestorage.app",
  messagingSenderId: "856520252558",
  appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= ELEMENTS ================= */
const form = document.getElementById("auth-form");
const title = document.getElementById("auth-title");
const nameField = document.getElementById("name-field");
const toggle = document.getElementById("toggle-mode");
const submitBtn = document.getElementById("auth-submit");

const email = document.getElementById("email");
const password = document.getElementById("password");
const name = document.getElementById("name");

let signUpMode = false;

/* ================= SIGN UP (NOW SAVES USERNAME) ================= */
async function signUp(nameVal, emailVal, passwordVal) {
  try {
    const userCred = await createUserWithEmailAndPassword(auth, emailVal, passwordVal);

    // ✅ SAVE USERNAME TO FIRESTORE
    await setDoc(doc(db, "users", userCred.user.uid), {
      username: nameVal || emailVal.split("@")[0],
      email: emailVal,
      createdAt: Date.now()
    });

    return true;
  } catch (err) {
    alert(err.message);
    return false;
  }
}

/* ================= SIGN IN ================= */
async function signIn(emailVal, passwordVal) {
  try {
    await signInWithEmailAndPassword(auth, emailVal, passwordVal);
    return true;
  } catch (err) {
    alert(err.message);
    return false;
  }
}

/* ================= TOGGLE MODE ================= */
toggle.addEventListener("click", () => {
  signUpMode = !signUpMode;

  nameField.classList.toggle("hidden", !signUpMode);
  title.textContent = signUpMode ? "Create account" : "Sign in";
  submitBtn.textContent = signUpMode ? "Create account" : "Sign in";
});

/* ================= FORM ================= */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const emailVal = email.value.trim();
  const passwordVal = password.value.trim();
  const nameVal = name.value.trim();

  if (!emailVal || !passwordVal) {
    alert("Enter email and password");
    return;
  }

  const success = signUpMode
    ? await signUp(nameVal, emailVal, passwordVal)
    : await signIn(emailVal, passwordVal);

  if (success) {
    window.location.href = "./index.html";
  }
});

/* ================= AUTO LOGIN CHECK ================= */
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "../chat/";
  }
});
</script>

</body>
</html>
