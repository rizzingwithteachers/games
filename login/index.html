<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarsonGames — Login</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(108,99,255,0.12), transparent 45%), #04050a; color: var(--text); font-family: var(--font); }
    .auth-shell { width: min(520px, calc(100vw - 2rem)); padding: 2rem; background: rgba(8,9,17,0.96); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; box-shadow: 0 30px 90px rgba(0,0,0,0.35); }
    .auth-header { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.75rem; }
    .auth-header h1 { margin: 0; font-family: var(--font-display); font-size: 2rem; letter-spacing: -0.04em; }
    .auth-header p { margin: 0; color: var(--text-muted); line-height: 1.65; }
    .auth-form { display: grid; gap: 1rem; }
    .input-group { display: grid; gap: 0.45rem; }
    .input-group label { font-size: 0.85rem; color: var(--text-muted); }
    .input-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 14px; font: inherit; }
    .input-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
    .auth-buttons { display: grid; gap: 0.85rem; }
    .auth-actions { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .auth-actions button { border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text); padding: 12px 16px; border-radius: 999px; cursor: pointer; }
    .auth-actions button:hover { border-color: rgba(108,99,255,0.3); }
    .btn-google { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.08); }
    .divider { display: flex; align-items: center; gap: 0.75rem; color: var(--text-muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .hidden { display: none !important; }
    .status-box { padding: 1rem 1rem 0.75rem; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: var(--text-muted); font-size: 0.9rem; min-height: 42px; }
    .brand-tag { display: inline-flex; align-items: center; gap: 0.5rem; padding: 8px 12px; background: rgba(255,255,255,0.04); color: var(--text); border-radius: 999px; font-size: 0.85rem; width: fit-content; }
    .brand-tag span { display: inline-flex; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .auth-footer { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="auth-shell">
    <div class="auth-header">
      <div>
        <h1 id="auth-title">Sign in</h1>
      </div>
    </div>

    <form id="auth-form" class="auth-form">
      <div id="name-field" class="input-group hidden">
        <label for="name">Username</label>
        <input id="name" name="name" type="text" placeholder="Username" autocomplete="name">
      </div>
      <div class="input-group">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="auth-buttons">
        <button type="submit" id="auth-submit" class="btn-primary">Sign in</button>
      </div>
      <div class="auth-actions">
        <span id="mode-text">Don’t have an account?</span>
        <button type="button" id="toggle-mode">Create account</button>
      </div>
    </form>

  </main>

  <script>
    const form = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const nameField = document.getElementById('name-field');
    const modeText = document.getElementById('mode-text');
    const toggleButton = document.getElementById('toggle-mode');
    const submitButton = document.getElementById('auth-submit');
    const statusBox = document.getElementById('status-box');
    const googleButton = document.getElementById('google-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const nameInput = document.getElementById('name');

    let signUpMode = false;
    const USERS_KEY = 'cgUsersSession';

    const getUsers = () => JSON.parse(sessionStorage.getItem(USERS_KEY) || '[]');
    const saveUsers = (users) => sessionStorage.setItem(USERS_KEY, JSON.stringify(users));
    const setStatus = (message, isError = false) => {
      statusBox.textContent = message;
      statusBox.style.color = isError ? '#fb7185' : 'var(--text-muted)';
    };

    const redirectIfSignedIn = () => {
      const current = sessionStorage.getItem('cgAuthUser');
      if (current) {
        window.location.href = '../chat/';
      }
    };

    const toggleMode = () => {
      signUpMode = !signUpMode;
      nameField.classList.toggle('hidden', !signUpMode);
      authTitle.textContent = signUpMode ? 'Create account' : 'Sign in';
      submitButton.textContent = signUpMode ? 'Create account' : 'Sign in';
      modeText.textContent = signUpMode ? 'Already have an account?' : 'Don’t have an account?';
      toggleButton.textContent = signUpMode ? 'Sign in' : 'Create account';
      setStatus(signUpMode ? 'Enter a name, email, and password to create a new account.' : 'Enter your email and password to sign in.');
    };

    const signIn = (email, password) => {
      const users = getUsers();
      const found = users.find((user) => user.email.toLowerCase() === email.toLowerCase());
      if (!found) {
        setStatus('No account found for that email.', true);
        return false;
      }
      if (found.password !== password) {
        setStatus('Incorrect password. Please try again.', true);
        return false;
      }
      sessionStorage.setItem('cgAuthUser', JSON.stringify({ email: found.email, name: found.name }));
      return true;
    };

    const signUp = (name, email, password) => {
      const users = getUsers();
      if (users.some((user) => user.email.toLowerCase() === email.toLowerCase())) {
        setStatus('An account with this email already exists.', true);
        return false;
      }
      if (password.length < 6) {
        setStatus('Password must be at least 6 characters.', true);
        return false;
      }
      const user = { name: name || email.split('@')[0], email, password };
      users.push(user);
      saveUsers(users);
      sessionStorage.setItem('cgAuthUser', JSON.stringify({ email: user.email, name: user.name }));
      return true;
    };

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const name = nameInput.value.trim();
      if (!email || !password) {
        setStatus('Please provide your email and password.', true);
        return;
      }
      const success = signUpMode ? signUp(name, email, password) : signIn(email, password);
      if (success) {
        setStatus('Success! Redirecting...', false);
        setTimeout(() => window.location.href = '../chat/', 500);
      }
    });

    toggleButton.addEventListener('click', toggleMode);

    googleButton.addEventListener('click', () => {
      sessionStorage.setItem('cgAuthUser', JSON.stringify({ email: 'google@carsongames.com', name: 'Google User' }));
      setStatus('Signed in with Google placeholder. Redirecting...', false);
      setTimeout(() => window.location.href = '../chat/', 500);
    });

    redirectIfSignedIn();
  </script>
</body>
</html>
