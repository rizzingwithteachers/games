<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Login</title>
  <link rel="stylesheet" href="../style.css">
  <script>
    const themeName = localStorage.getItem('carson_theme');
    if (themeName && themeName !== 'default') {
      document.documentElement.classList.add('theme-' + themeName);
    }
  </script>

  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(108,99,255,0.12), transparent 45%), var(--bg); color: var(--text); font-family: var(--font); }
    .auth-shell { width: min(520px, calc(100vw - 2rem)); padding: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 30px 90px rgba(0,0,0,0.35); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
    .auth-header { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.75rem; }
    .auth-header h1 { margin: 0; font-family: var(--font-display); font-size: 2rem; letter-spacing: -0.04em; }
    .auth-header p { margin: 0; color: var(--text-muted); line-height: 1.65; }
    .auth-form { display: grid; gap: 1rem; }
    .input-group { display: grid; gap: 0.45rem; }
    .input-group label { font-size: 0.85rem; color: var(--text-muted); }
    .input-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 14px; font: inherit; }
    .input-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
    .auth-buttons { display: grid; gap: 0.85rem; }
    .auth-actions { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .auth-actions button { border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 12px 16px; border-radius: 999px; cursor: pointer; transition: all 0.2s var(--ease); }
    .auth-actions button:hover { border-color: var(--accent); transform: translateY(-1px); }
    .hidden { display: none !important; }
  </style>
</head>

<body>

<main class="auth-shell">

  <div class="auth-header">
    <h1 id="auth-title">Sign in</h1>
  </div>

  <form id="auth-form" class="auth-form">

    <div id="name-field" class="input-group hidden">
      <label>Username</label>
      <input id="name" type="text" placeholder="Username">
    </div>

    <div class="input-group">
      <label>Email address</label>
      <input id="email" type="email" placeholder="you@example.com" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" required>
    </div>

    <div class="auth-buttons">
      <button type="submit" id="auth-submit" class="btn-primary">Sign in</button>
    </div>

    <div class="auth-actions">
      <span id="mode-text">Don’t have an account?</span>
      <button type="button" id="toggle-mode">Create account</button>
    </div>

  </form>

</main>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* SUPABASE CONFIG */
const supabaseUrl = "https://hbynnertatvxpvtqctyg.supabase.co";
const supabaseKey = "sb_publishable_WnnU16Mfj1rmRJcEStOzeQ_BExLbP2C";
const supabase = createClient(supabaseUrl, supabaseKey);

/* ELEMENTS */
const form = document.getElementById("auth-form");
const title = document.getElementById("auth-title");
const nameField = document.getElementById("name-field");
const toggle = document.getElementById("toggle-mode");
const submitBtn = document.getElementById("auth-submit");

const email = document.getElementById("email");
const password = document.getElementById("password");
const nameInput = document.getElementById("name");

let signUpMode = false;

/* REAL-TIME SPACE FILTER STRIPPER */
nameInput.addEventListener("input", (e) => {
  e.target.value = e.target.value.replace(/\s/g, "");
});

/* SIGN UP */
async function signUp(username, emailVal, passwordVal) {
  if (!username?.trim()) {
    alert("Username is required");
    return false;
  }

  if (/\s/.test(username)) {
    alert("Username cannot contain spaces!");
    return false;
  }

  const { data, error } = await supabase.auth.signUp({
    email: emailVal,
    password: passwordVal
  });

  if (error) {
    alert(error.message);
    return false;
  }

  if (data?.user) {
    // Inject profile properties directly inside your public schema tracking system
    const { error: profileError } = await supabase
      .from("users")
      .insert([
        {
          id: data.user.id,
          username: username.trim(),
          email: emailVal,
          role: "user",
          rank: "basic",
          createdAt: Date.now()
        }
      ]);

    if (profileError) {
      console.error("Failed structural profile provisioning logic maps:", profileError.message);
    }
  }

  return true;
}

/* SIGN IN */
async function signIn(emailVal, passwordVal) {
  const { error } = await supabase.auth.signInWithPassword({
    email: emailVal,
    password: passwordVal
  });

  if (error) {
    alert(error.message);
    return false;
  }
  return true;
}

/* TOGGLE MODE */
toggle.addEventListener("click", () => {
  signUpMode = !signUpMode;

  nameField.classList.toggle("hidden", !signUpMode);
  nameInput.required = signUpMode;

  title.textContent = signUpMode ? "Create account" : "Sign in";
  submitBtn.textContent = signUpMode ? "Create account" : "Sign in";

  document.getElementById("mode-text").textContent =
    signUpMode ? "Already have an account?" : "Don't have an account?";

  toggle.textContent = signUpMode ? "Sign in" : "Create account";
});

/* FORM SUBMISSION */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const emailVal = email.value.trim();
  const passwordVal = password.value.trim();
  const usernameVal = nameInput.value.trim();

  if (!emailVal || !passwordVal) {
    alert("Enter email and password");
    return;
  }

  let ok = false;

  try {
    if (signUpMode) {
      ok = await signUp(usernameVal, emailVal, passwordVal);
    } else {
      ok = await signIn(emailVal, passwordVal);
    }

    if (ok) {
      window.location.replace("../chat/");
    }
  } catch (error) {
    console.error("Authentication Error:", error);
    alert(error.message);
  }
});

/* AUTH CHECK */
supabase.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    // Keep user state tracked if needed
  }
});
</script>

</body>
</html>
