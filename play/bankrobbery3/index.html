<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/cg-rip@main/bank-robbery-3/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>

<body style="margin:0;padding:0">

<div id="loading-text" style="color:black;font-size:48px;font-family:cursive;text-align:center;margin-top:20px;">
  LOADING...
</div>

<canvas id="unity-canvas"
  style="position:fixed;top:0;left:0;width:100%;height:100%;outline:none">
</canvas>

<script>
const SPLIT_MAP = {"BankRobbery3.wasm": null, "BankRobbery3.data": null};

async function mergeParts(baseUrl) {
  const parts = [];
  for (let i = 1; i <= 99; i++) {
    const testUrl = baseUrl + ".part" + i;
    try {
      const head = await fetch(testUrl, { method: "HEAD" });
      if (!head.ok) break;
      parts.push(testUrl);
    } catch { break; }
  }
  if (parts.length === 0) return baseUrl;

  const buffers = await Promise.all(parts.map(async (u) => {
    const r = await fetch(u);
    return new Uint8Array(await r.arrayBuffer());
  }));

  const total = buffers.reduce((a, b) => a + b.length, 0);
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const b of buffers) {
    merged.set(b, offset);
    offset += b.length;
  }

  return URL.createObjectURL(new Blob([merged]));
}

async function preMergeAll() {
  const map = {};
  const files = Object.keys(SPLIT_MAP);
  let done = 0;

  const loadingText = document.getElementById("loading-text");

  for (const file of files) {
    const merged = await mergeParts("Build/" + file);
    map[file] = merged;
    done++;

    const percent = Math.floor((done / files.length) * 100);
    loadingText.innerText = `LOADING... ${percent}%`;
  }

  loadingText.style.display = "none";
  return map;
}

(async () => {
  const mergedMap = await preMergeAll();
  window.SPLIT_MAP = mergedMap;

  const origFetch = window.fetch;
  window.fetch = async function(resource, options) {
    if (typeof resource === "string") {
      const key = resource.split("/").pop();
      if (mergedMap[key]) {
        return origFetch(mergedMap[key], options);
      }
    }
    return origFetch(resource, options);
  };

  const canvas = document.querySelector("#unity-canvas");

  const config = {
    dataUrl: "Build/BankRobbery3.data",
    frameworkUrl: "Build/BankRobbery3.framework.js",
    codeUrl: "Build/BankRobbery3.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "Bank Robbery 3",
    productName: "Bank Robbery 3",
    productVersion: "1.0.0"
  };

  const script = document.createElement("script");
  script.src = "Build/BankRobbery3.loader.js";
  script.onload = () => {
    createUnityInstance(canvas, config).catch(alert);
  };

  document.body.appendChild(script);
})();
</script>

<script>
function resizeCanvas() {
  const canvas = document.getElementById("unity-canvas");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
