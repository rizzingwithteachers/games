<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Escape Road 2</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: absolute;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      background: #231f20;
      display: block;
    }

    #unity-loading-bar {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      color: white;
      font-family: sans-serif;
    }

    #unity-progress-bar-empty {
      width: 80%;
      height: 20px;
      border: 1px solid #fff;
      margin: 10px auto;
    }

    #unity-progress-bar-full {
      height: 100%;
      width: 0%;
      background: #fff;
    }

    #unity-fullscreen-button {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      color: white;
      text-align: center;
      line-height: 40px;
      cursor: pointer;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div>Loading...</div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-fullscreen-button">⛶</div>
</div>

<script>
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");

  const config = {
    dataUrl: "https://cdn.jsdelivr.net/gh/lonya-k/aws@8e4931429a9c08b542c8def752b11a412dfef6b2/eks_cicd/csrd.js",
    frameworkUrl: "https://cdn.jsdelivr.net/gh/genizy/google-class@3b96af8847aa44f44774e663a9e99b9ca235da7f/escaperoad2/random1.js",
    codeUrl: "https://cdn.jsdelivr.net/gh/lonya-k/aws@8e4931429a9c08b542c8def752b11a412dfef6b2/eks_cicd/csrw.js",
    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/lonya-k/aws@193add90970804b994d7c2cb1159bf825810a8be/eks_cicd",
    companyName: "1games.io",
    productName: "Escape Road 2",
    productVersion: "2.0"
  };

  function loadUnity() {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/gh/genizy/google-class@main/escaperoad2/random3.js";

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (progress * 100) + "%";
      }).then(() => {
        loadingBar.style.display = "none";
      }).catch(console.error);
    };

    document.body.appendChild(script);
  }

  document.querySelector("#unity-fullscreen-button").onclick = () => {
    if (canvas.requestFullscreen) canvas.requestFullscreen();
  };

  window.onload = loadUnity;
</script>

</body>
</html>
