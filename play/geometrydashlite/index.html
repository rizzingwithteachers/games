<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometry Dash Lite</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
    }

    #gameContainer {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #loader {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="gameContainer"></div>
<div id="loader">Loading Geometry Dash...</div>

<script src="Build/UnityLoader.js"></script>

<script>
  var gameInstance = UnityLoader.instantiate(
    "gameContainer",
    "Build/GeometryDashLite.json",
    {
      onProgress: function(instance, progress) {
        if (progress === 1) {
          document.getElementById("loader").style.display = "none";
        }
      }
    }
  );
</script>

</body>
</html>
