<html>
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#2d3331" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Paper.io 2</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="images/icon192.png" />
    <link rel="shortcut icon" type="image/png" href="images/icon192.png" />

    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style3.css" />
  </head>

  <body>

    <div id="game">
      <canvas class="fadein" id="view" width="922" height="888"></canvas>

      <div id="ui_overlay"></div>

      <div id="ui">
        <div id="left_side"></div>

        <div class="uibox">
          <div class="logo">
            <img src="images/logo.png" />
          </div>

          <div class="tips">
            <div class="tip">Bite enemy tails but don't let them bite yours!</div>
          </div>

          <form class="play">
            <input type="text" id="nick" name="nick" autocomplete="off" placeholder="Your name" maxlength="12" />
            <button id="play" name="play" class="yellow">PLAY</button>
          </form>

          <!-- removed ad banner -->
        </div>

        <div id="right_side">
          <div class="own_banner">
            <a href="/" target="_blank">Homepage</a>
          </div>
        </div>
      </div>

      <div id="footer">
        <ul id="lng">
          <li class="active">EN</li>
          <li>RU</li>
          <li>TR</li>
          <li>SP</li>
          <li>FR</li>
          <li>NL</li>
          <li>PT</li>
          <li>DE</li>
          <li>IT</li>
        </ul>

        <div id="bottom">
          <a href="/" target="_blank">Homepage</a>
        </div>
      </div>

      <div id="overlay"></div>
    </div>

  </body>
</html>
