<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/escaperoad2city/">
  <title>Escape Road City 2</title>

  <style>
    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }
    #gameContainer {
      position: absolute;
    }
    #gameContainer canvas {
      position: absolute;
    }
  </style>
</head>

<body>

  <!-- KEEP SDK FILE (some builds depend on it), but we neutralize tracking -->
  <script src="gmsoftsdk_v5.js"></script>

  <div id="gameContainer" style="display:none;">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBar" style="color:white; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:Arial;">
    loading... <span id="pct">0%</span>
  </div>

  <!-- Stub analytics (prevents errors if game calls them) -->
  <script>
    function firebaseLogEvent() {}
    function firebaseLogEventParameter() {}
    function firebaseSetUserProperties() {}
  </script>

  <script>
    var canvas = document.getElementById("unity-canvas");
    var container = document.getElementById("gameContainer");
    var loadingBar = document.getElementById("loadingBar");

    var buildUrl = "Build";
    var config = {
      dataUrl: buildUrl + "/escape-road-city-2-v25022604.data.unityweb",
      frameworkUrl: buildUrl + "/escape-road-city-2-v25022604.framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-city-2-v25022604.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "azgames.io",
      productName: "Tung Sahur Horror",
      productVersion: "25051505"
    };

    function onResize() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var r = 540 / 960;

      if (w * r > h) w = Math.ceil(h / r);
      h = Math.floor(w * r);

      container.style.width  = canvas.style.width  = w + "px";
      container.style.height = canvas.style.height = h + "px";
      container.style.top  = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left = Math.floor((window.innerWidth  - w) / 2) + "px";
    }

    window.addEventListener("resize", onResize);
    onResize();

    var script = document.createElement("script");
    script.src = buildUrl + "/escape-road-city-2-v25022604.loader.js";

    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        document.getElementById("pct").innerText = Math.round(progress * 100) + "%";
      }).then(function(instance) {
        window.unityInstance = instance;
        loadingBar.style.display = "none";
        container.style.display = "block";
      }).catch(function(err) {
        console.error(err);
        alert("Game failed to load");
      });
    };

    document.body.appendChild(script);
  </script>

</body>
</html>
