<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Proxy</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .proxy-wrapper { display: flex; flex-direction: column; flex: 1; padding: 0; max-width: none; width: 100%; margin: 0 auto; }
    .browser-bar { background: var(--card); border: 1px solid var(--border); border-radius: 0; padding: 12px 20px; display: flex; gap: 1rem; align-items: center; position: sticky; top: 0; z-index: 30; }
    .browser-bar .input-field { flex: 1; height: 44px; padding: 0 14px; background: var(--bg); font-family: monospace; font-size: 0.95rem; }
    .frame-viewport { background: #020205; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-l) var(--radius-l); flex: 1; min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; position: relative; }
    .fallback-message { text-align: center; color: var(--text-muted); max-width: 340px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="#" class="active">Proxy</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="../settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="proxy-wrapper">
    <div class="browser-bar">
      <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-right:8px;">Proxy</div>
      <input type="text" class="input-field" value="" placeholder="Enter URL...">
      <button class="btn-primary" style="padding: 0 18px; height: 40px; font-size: 0.95rem;">Go</button>
    </div>
    
    <div class="frame-viewport">
      <div class="fallback-message">
        <p style="color: var(--text); font-weight: 600; margin-bottom: 0.5rem;">Proxy</p>
        <p>Enter a URL above and press Go</p>
      </div>
    </div>
  </main>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
    authDomain: "carson-games.firebaseapp.com",
    projectId: "carson-games",
    storageBucket: "carson-games.firebasestorage.app",
    messagingSenderId: "856520252558",
    appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  onAuthStateChanged(auth, (user) => {
    const container = document.getElementById('auth-button-container');
    if (!user) {
      window.location.replace("../login/");
      return;
    }
    
    container.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
    document.getElementById('logout-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        await signOut(auth);
        window.location.reload();
      } catch (err) {
        console.error('Logout error:', err);
      }
    });
    console.log("Proxy access granted:", user.email);
  });
  </script>


  

</body>
</html>
