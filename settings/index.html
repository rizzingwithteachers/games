<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Carson Games</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  <style>
    .settings-hero { text-align: center; padding: 4rem 2rem 2rem; }
    .settings-hero h1 { font-family: var(--font-display); font-size: 3rem; font-weight: 800; }
    .settings-hero p { color: var(--text-muted); margin-top: 0.5rem; }

    .settings-container { max-width: 800px; margin: 0 auto; padding: 0 2rem 6rem; width: 100%; }
    .settings-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-l); padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 2.5rem; }
    .settings-section { display: flex; flex-direction: column; gap: 1.25rem; }
    .settings-section h3 { font-family: var(--font-display); font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; color: #fff; }
    
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
    .form-group input, .form-group textarea { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: var(--radius-m); padding: 0.75rem 1rem; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s var(--ease); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(108, 99, 255, 0.15); }
    .btn-container { display: flex; justify-content: flex-end; }

    /* ── BACKGROUND GALLERY GRID (6 PER ROW) ── */
    .background-grid-wrapper {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
      width: 100%;
      margin-top: 0.5rem;
    }
    .background-thumb-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .thumb-canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-m);
      border: 2px solid var(--border);
      background-size: cover;
      background-position: center;
      transition: all 0.25s var(--ease);
    }
    .background-thumb-card:hover .thumb-canvas, .background-thumb-card.active .thumb-canvas {
      border-color: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.3);
    }
    .thumb-label {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
      text-transform: capitalize;
    }
    .background-thumb-card.active .thumb-label { color: #fff; }

    /* ── FIREBASE-STYLE CRUD LIST MANAGER FOR ANNOUNCEMENTS ── */
    .crud-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .crud-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-m);
    }
    .crud-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    .btn-remove-item {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #ef4444;
      font-weight: 800;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .btn-remove-item:hover {
      background: #ef4444;
      color: #fff;
    }

    .add-row-box {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .add-row-box input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-m);
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    .add-row-box input:focus {
      border-color: var(--accent);
    }

    .status-msg { font-size: 0.9rem; margin-top: 0.5rem; }
    .status-success { color: #4ade80; }
    .status-error { color: #f87171; }
    .logged-out-msg { text-align: center; padding: 3rem 0; }

    @media (max-width: 768px) {
      .background-grid-wrapper { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="#" class="active">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="settings-hero">
    <h1>Account Settings</h1>
    <p>Change your configuration and interface options</p>
  </section>

  <main class="settings-container">
    <div id="settings-wrapper" class="settings-card">
      <div class="logged-out-msg">
        <p>Please sign in to view and change your settings.</p>
        <br>
        <a href="../login/" class="btn-primary">Sign In</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    /* SUPABASE CONFIG */
    const supabaseUrl = "https://hbynnertatvxpvtqctyg.supabase.co";
    const supabaseKey = "sb_publishable_WnnU16Mfj1rmRJcEStOzeQ_BExLbP2C";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const settingsWrapper = document.getElementById('settings-wrapper');
    const navAuthContainer = document.getElementById('auth-button-container');

    const localThemeCached = localStorage.getItem('carson_theme');
    if (localThemeCached && localThemeCached !== 'default') {
      document.body.className = 'theme-' + localThemeCached;
    }

    const THEME_DATA_MAP = [
      { id: 'default', type: 'color', val: '#06060c', label: 'default' },
      { id: 'red', type: 'color', val: '#1c0505', label: 'red' },
      { id: 'orange', type: 'color', val: '#1c0f05', label: 'orange' },
      { id: 'yellow', type: 'color', val: '#161402', label: 'yellow' },
      { id: 'green', type: 'color', val: '#03140a', label: 'green' },
      { id: 'blue', type: 'color', val: '#030a1c', label: 'blue' },
      { id: 'purple', type: 'color', val: '#0f031c', label: 'purple' },
      { id: 'stars', type: 'img', val: '../assets/stars.png', label: 'stars' },
      { id: 'lightning', type: 'img', val: '../assets/lightning.png', label: 'lightning' },
      { id: 'teal-magenta', type: 'gradient', val: 'linear-gradient(135deg, #0d2b30, #300d2b)', label: 'teal + magenta' },
      { id: 'blue-pink', type: 'img', val: '../assets/blue+pink.png', label: 'blue + pink' },
      { id: 'blue-spots', type: 'img', val: '../assets/blue-spots.png', label: 'blue spots' },
      { id: 'white-spots', type: 'img', val: '../assets/white-spots.png', label: 'white spots' }
    ];

    const renderSettingsInterface = async (user) => {
      if (!user) return;

      navAuthContainer.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
      navAuthContainer.style.display = '';
      
      const { data: profile } = await supabase.from("users").select("*").eq("id", user.id).single();
      const currentBgSetting = (profile && profile.background) ? profile.background : 'default';
      const currentUserRole = (profile && profile.role) ? profile.role : 'user';

      localStorage.setItem('carson_theme', currentBgSetting);
      document.body.className = currentBgSetting === 'default' ? '' : 'theme-' + currentBgSetting;

      settingsWrapper.innerHTML = `
        <form id="username-form" class="settings-section">
          <h3>Change Username</h3>
          <div class="form-group">
            <label for="username">New Username</label>
            <input type="text" id="username" value="${profile?.username || ''}" required>
          </div>
          <div class="btn-container"><button type="submit" class="btn-primary">Update Username</button></div>
          <div id="username-msg" class="status-msg"></div>
        </form>

        <div class="settings-section">
          <h3>Background Gallery</h3>
          <div class="background-grid-wrapper" id="thumb-matrix-target"></div>
          <div id="background-msg" class="status-msg"></div>
        </div>

        <div id="owner-panel-injection-point"></div>
      `;

      // Render Themes
      const thumbContainer = document.getElementById("thumb-matrix-target");
      THEME_DATA_MAP.forEach(theme => {
        const thumb = document.createElement("div");
        thumb.className = `background-thumb-card ${currentBgSetting === theme.id ? 'active' : ''}`;
        thumb.dataset.id = theme.id;

        let canvasStyle = "";
        if (theme.type === 'color') canvasStyle = `background-color: ${theme.val};`;
        if (theme.type === 'gradient') canvasStyle = `background: ${theme.val};`;
        if (theme.type === 'img') canvasStyle = `background-image: url('${theme.val}');`;

        thumb.innerHTML = `<div class="thumb-canvas" style="${canvasStyle}"></div><div class="thumb-label">${theme.label}</div>`;
        
        thumb.onclick = async () => {
          document.querySelectorAll('.background-thumb-card').forEach(c => c.classList.remove('active'));
          thumb.classList.add('active');
          const bgMsg = document.getElementById("background-msg");

          try {
            document.body.className = theme.id === 'default' ? '' : 'theme-' + theme.id;
            localStorage.setItem('carson_theme', theme.id);
            await supabase.from("users").update({ background: theme.id }).eq("id", user.id);
            bgMsg.textContent = "Theme updated!";
            bgMsg.className = "status-msg status-success";
          } catch(err) {
            bgMsg.textContent = "Error saving theme.";
            bgMsg.className = "status-msg status-error";
          }
        };
        thumbContainer.appendChild(thumb);
      });

      // Render Owner CRUD Announcements Manager
      if (currentUserRole === 'owner') {
        const ownerSection = document.getElementById("owner-panel-injection-point");
        ownerSection.innerHTML = `
          <div class="settings-section">
            <h3>Manage Announcements (Owner)</h3>
            <div id="crud-announcements-list" class="crud-list">Loading announcements...</div>
            
            <div class="add-row-box">
              <input type="text" id="new-announcement-input" placeholder="Type new announcement...">
              <button id="btn-add-announcement" class="btn-primary">+ Add</button>
            </div>
            <div id="announcement-msg" class="status-msg"></div>
          </div>
        `;

        loadOwnerAnnouncementsList();

        document.getElementById("btn-add-announcement").onclick = async () => {
          const input = document.getElementById("new-announcement-input");
          const msgEl = document.getElementById("announcement-msg");
          const val = input.value.trim();
          if (!val) return;

          try {
            const { error } = await supabase.from("announcements").insert([{ text: val }]);
            if (error) throw error;
            input.value = "";
            msgEl.textContent = "Announcement added!";
            msgEl.className = "status-msg status-success";
            loadOwnerAnnouncementsList();
          } catch (err) {
            msgEl.textContent = "Error adding: " + err.message;
            msgEl.className = "status-msg status-error";
          }
        };
      }

      // Username Form Submission
      document.getElementById('username-form').onsubmit = async (e) => {
        e.preventDefault();
        const newUsername = document.getElementById('username').value.trim();
        const msgEl = document.getElementById('username-msg');
        try {
          await supabase.from("users").update({ username: newUsername }).eq("id", user.id);
          msgEl.textContent = 'Username updated!';
          msgEl.className = 'status-msg status-success';
        } catch (err) {
          msgEl.textContent = 'Failed to update username.';
          msgEl.className = 'status-msg status-error';
        }
      };
    };

    /* FETCH & RENDER ANNOUNCEMENT CRUD ITEMS */
    async function loadOwnerAnnouncementsList() {
      const listEl = document.getElementById("crud-announcements-list");
      if (!listEl) return;

      const { data: records, error } = await supabase
        .from("announcements")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        listEl.innerHTML = `<div style="color:#ef4444; font-size:0.9rem;">Error loading items: ${error.message}</div>`;
        return;
      }

      if (!records || records.length === 0) {
        listEl.innerHTML = `<div style="color:var(--text-muted); font-size:0.9rem;">No announcements created yet. Add one below!</div>`;
        return;
      }

      listEl.innerHTML = "";
      records.forEach(item => {
        const row = document.createElement("div");
        row.className = "crud-item";
        row.innerHTML = `
          <input type="text" value="${escapeHtml(item.text)}" readonly>
          <button class="btn-remove-item" title="Delete Announcement">-</button>
        `;

        row.querySelector(".btn-remove-item").onclick = async () => {
          try {
            await supabase.from("announcements").delete().eq("id", item.id);
            loadOwnerAnnouncementsList();
          } catch (err) {
            alert("Failed to delete item: " + err.message);
          }
        };

        listEl.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    supabase.auth.onAuthStateChange((event, session) => {
      renderSettingsInterface(session?.user || null);
    });
  </script>
</body>
</html>
