<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Carson Games</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  <style>
    .settings-hero {
      text-align: center;
      padding: 5rem 2rem 2rem;
      background: radial-gradient(circle at top center, rgba(108,99,255,0.08) 0%, transparent 65%);
    }
    .settings-hero h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a5b4fc 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .settings-hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .settings-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      width: 100%;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-l);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .settings-section h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .form-group input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-m, 8px);
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s var(--ease);
    }
    .form-group input:focus {
      outline: none;
      border-color: rgba(108, 99, 255, 0.5);
      background: rgba(108, 99, 255, 0.02);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.15);
    }
    .btn-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }
    .status-msg {
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .status-success { color: #4ade80; }
    .status-error { color: #f87171; }
    
    .logged-out-msg {
      text-align: center;
      padding: 3rem 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="#" class="active">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="settings-hero">
    <h1>Account Settings</h1>
    <p>Manage your Carson Games profile information</p>
  </section>

  <main class="settings-container">
    <div id="settings-wrapper" class="settings-card">
      <div class="logged-out-msg">
        <p>Please sign in to view and change your settings.</p>
        <br>
        <a href="../login/" class="btn-primary">Sign In</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
      authDomain: "carson-games.firebaseapp.com",
      projectId: "carson-games",
      storageBucket: "carson-games.firebasestorage.app",
      messagingSenderId: "856520252558",
      appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const settingsWrapper = document.getElementById('settings-wrapper');
    const navAuthContainer = document.getElementById('auth-button-container');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        navAuthContainer.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
        document.getElementById('logout-btn').addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            await signOut(auth);
            window.location.reload();
          } catch (err) {
            console.error('Logout error:', err);
          }
        });

        settingsWrapper.innerHTML = `
          <form id="username-form" class="settings-section">
            <h3>Change Username</h3>
            <div class="form-group">
              <label for="username">New Username</label>
              <input type="text" id="username" value="${user.displayName || ''}" placeholder="Enter new username" required>
            </div>
            <div class="btn-container">
              <button type="submit" class="btn-primary">Update Username</button>
            </div>
            <div id="username-msg" class="status-msg"></div>
          </form>

          <form id="password-form" class="settings-section">
            <h3>Change Password</h3>
            <div class="form-group">
              <label for="new-password">New Password</label>
              <input type="password" id="new-password" placeholder="••••••••" minlength="6" required>
            </div>
            <div class="btn-container">
              <button type="submit" class="btn-primary">Update Password</button>
            </div>
            <div id="password-msg" class="status-msg"></div>
          </form>
        `;

        // Handle Username Submission
        document.getElementById('username-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newUsername = document.getElementById('username').value;
          const msgEl = document.getElementById('username-msg');
          msgEl.className = 'status-msg';
          msgEl.textContent = '';

          try {
            // 1. Update Auth Profile
            await updateProfile(auth.currentUser, { displayName: newUsername });

            // 2. Safely Update Firestore Document with setDoc + merge
            const userDocRef = doc(db, "users", auth.currentUser.uid);
            await setDoc(userDocRef, {
              username: newUsername
            }, { merge: true });

            msgEl.textContent = 'Username updated successfully! Refreshing...';
            msgEl.classList.add('status-success');
            
            setTimeout(() => {
              window.location.reload();
            }, 1500);

          } catch (err) {
            console.error(err);
            msgEl.textContent = "Error updating username: " + err.message;
            msgEl.classList.add('status-error');
          }
        });

        // Handle Password Submission
        document.getElementById('password-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newPassword = document.getElementById('new-password').value;
          const msgEl = document.getElementById('password-msg');
          msgEl.className = 'status-msg';
          msgEl.textContent = '';

          try {
            await updatePassword(auth.currentUser, newPassword);
            msgEl.textContent = 'Password updated successfully!';
            msgEl.classList.add('status-success');
            document.getElementById('new-password').value = '';
          } catch (err) {
            if (err.code === 'auth/requires-recent-login') {
              msgEl.textContent = 'Security rule triggered. Please sign out and sign back in to change your password.';
            } else {
              msgEl.textContent = err.message;
            }
            msgEl.classList.add('status-error');
          }
        });

      } else {
        navAuthContainer.innerHTML = '<a href="../login/" class="nav-auth-btn">Sign In</a>';
        settingsWrapper.innerHTML = `
          <div class="logged-out-msg">
            <p>Please sign in to view and change your settings.</p>
            <br>
            <a href="../login/" class="btn-primary">Sign In</a>
          </div>
        `;
      }
    });
  </script>

</body>
</html>
