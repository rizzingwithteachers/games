<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Carson Games</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  <style>
    .settings-hero {
      text-align: center;
      padding: 5rem 2rem 2rem;
      background: radial-gradient(circle at top center, rgba(108,99,255,0.08) 0%, transparent 65%);
    }
    .settings-hero h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a5b4fc 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .settings-hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .settings-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      width: 100%;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-l);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .settings-section h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .form-group input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-m, 8px);
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s var(--ease);
    }
    .form-group input:focus {
      outline: none;
      border-color: rgba(108, 99, 255, 0.5);
      background: rgba(108, 99, 255, 0.02);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.15);
    }
    .btn-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }
    .status-msg {
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .status-success { color: #4ade80; }
    .status-error { color: #f87171; }
    
    .logged-out-msg {
      text-align: center;
      padding: 3rem 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="#" class="active">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="settings-hero">
    <h1>Account Settings</h1>
    <p>Change your account settings</p>
  </section>

  <main class="settings-container">
    <div id="settings-wrapper" class="settings-card">
      <div class="logged-out-msg">
        <p>Please sign in to view and change your settings.</p>
        <br>
        <a href="../login/" class="btn-primary">Sign In</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    /* SUPABASE CONFIG */
    const supabaseUrl = "https://hbynnertatvxpvtqctyg.supabase.co";
    const supabaseKey = "sb_publishable_WnnU16Mfj1rmRJcEStOzeQ_BExLbP2C";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const settingsWrapper = document.getElementById('settings-wrapper');
    const navAuthContainer = document.getElementById('auth-button-container');

    if (navAuthContainer) {
      navAuthContainer.innerHTML = '';
      navAuthContainer.style.display = 'none';
    }

    const renderSettingsInterface = async (user) => {
      if (user) {
        navAuthContainer.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
        navAuthContainer.style.display = '';
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
              await supabase.auth.signOut();
              window.location.reload();
            } catch (err) {
              console.error('Logout error:', err);
            }
          });
        }

        // Fetch user profile properties asynchronously from public table rows
        let existingProfileName = "";
        const { data: profile } = await supabase
          .from("users")
          .select("username")
          .eq("id", user.id)
          .single();

        if (profile) {
          existingProfileName = profile.username || "";
        }

        settingsWrapper.innerHTML = `
          <form id="username-form" class="settings-section">
            <h3>Change Username</h3>
            <div class="form-group">
              <label for="username">New Username</label>
              <input type="text" id="username" value="${existingProfileName}" placeholder="Enter new username" required>
            </div>
            <div class="btn-container">
              <button type="submit" class="btn-primary">Update Username</button>
            </div>
            <div id="username-msg" class="status-msg"></div>
          </form>

          <form id="password-form" class="settings-section">
            <h3>Change Password</h3>
            <div class="form-group">
              <label for="new-password">New Password</label>
              <input type="password" id="new-password" placeholder="••••••••" minlength="6" required>
            </div>
            <div class="btn-container">
              <button type="submit" class="btn-primary">Update Password</button>
            </div>
            <div id="password-msg" class="status-msg"></div>
          </form>
        `;

        // Handle Username Submission
        document.getElementById('username-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newUsername = document.getElementById('username').value.trim();
          const msgEl = document.getElementById('username-msg');
          msgEl.className = 'status-msg';
          msgEl.textContent = '';

          try {
            // Update profile data in the public users database table mapping
            const { error } = await supabase
              .from("users")
              .update({ username: newUsername })
              .eq("id", user.id);

            if (error) throw error;

            msgEl.textContent = 'Username updated successfully! Refreshing...';
            msgEl.classList.add('status-success');
            
            setTimeout(() => {
              window.location.reload();
            }, 1500);

          } catch (err) {
            console.error(err);
            msgEl.textContent = "Error updating username: " + err.message;
            msgEl.classList.add('status-error');
          }
        });

        // Handle Password Submission
        document.getElementById('password-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newPassword = document.getElementById('new-password').value;
          const msgEl = document.getElementById('password-msg');
          msgEl.className = 'status-msg';
          msgEl.textContent = '';

          try {
            const { error } = await supabase.auth.updateUser({
              password: newPassword
            });

            if (error) throw error;

            msgEl.textContent = 'Password updated successfully!';
            msgEl.classList.add('status-success');
            document.getElementById('new-password').value = '';
          } catch (err) {
            msgEl.textContent = err.message;
            msgEl.classList.add('status-error');
          }
        });

      } else {
        navAuthContainer.innerHTML = '<a href="../login/" class="nav-auth-btn">Sign In</a>';
        navAuthContainer.style.display = '';
        settingsWrapper.innerHTML = `
          <div class="logged-out-msg">
            <p>Please sign in to view and change your settings.</p>
            <br>
            <a href="../login/" class="btn-primary">Sign In</a>
          </div>
        `;
      }
    };

    // Keep auth state sync parameters monitored automatically
    supabase.auth.onAuthStateChange((event, session) => {
      renderSettingsInterface(session?.user || null);
    });
  </script>

</body>
</html>
