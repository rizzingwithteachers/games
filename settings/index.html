<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Carson Games</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── DYNAMIC THEME CLASSES ── */
    body {
      transition: background 0.3s ease;
    }
    body.theme-red { background-color: #1c0505 !important; background-image: none; }
    body.theme-orange { background-color: #1c0f05 !important; background-image: none; }
    body.theme-yellow { background-color: #161402 !important; background-image: none; }
    body.theme-green { background-color: #03140a !important; background-image: none; }
    body.theme-blue { background-color: #030a1c !important; background-image: none; }
    body.theme-purple { background-color: #0f031c !important; background-image: none; }

    body.theme-stars { background-image: url('../assets/stars.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }
    body.theme-lightning { background-image: url('../assets/lightning.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }
    body.theme-teal-magenta { background-image: url('../assets/teal-magenta.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }
    body.theme-blue-pink { background-image: url('../assets/blue-pink.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }
    body.theme-blue-spots { background-image: url('../assets/blue-spots.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }
    body.theme-white-spots { background-image: url('../assets/white-spots.png') !important; background-size: cover; background-attachment: fixed; background-position: center; }

    .settings-hero { text-align: center; padding: 4rem 2rem 2rem; }
    .settings-hero h1 { font-family: var(--font-display); font-size: 3rem; font-weight: 800; }
    .settings-hero p { color: var(--text-muted); margin-top: 0.5rem; }

    .settings-container { max-width: 800px; margin: 0 auto; padding: 0 2rem 6rem; width: 100%; }
    .settings-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-l); padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 2.5rem; }
    .settings-section { display: flex; flex-direction: column; gap: 1.25rem; }
    .settings-section h3 { font-family: var(--font-display); font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; color: #fff; }
    
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
    .form-group input, .form-group textarea { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: var(--radius-m); padding: 0.75rem 1rem; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s var(--ease); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(108, 99, 255, 0.15); }
    .btn-container { display: flex; justify-content: flex-end; margin-top: 0.5rem; }

    /* ── BACKGROUND GALLERY GRID (6 PER ROW) ── */
    .background-grid-wrapper {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
      width: 100%;
      margin-top: 0.5rem;
    }
    .background-thumb-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .thumb-canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-m);
      border: 2px solid var(--border);
      background-size: cover;
      background-position: center;
      transition: all 0.25s var(--ease);
    }
    .background-thumb-card:hover .thumb-canvas, .background-thumb-card.active .thumb-canvas {
      border-color: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.3);
    }
    .thumb-label {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
      text-transform: capitalize;
    }
    .background-thumb-card.active .thumb-label { color: #fff; }

    /* ── HEADER ROW WITH TOP-RIGHT PLUS / MINUS CONTROLS ── */
    .section-header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .section-header-controls h3 {
      border-bottom: none;
      padding-bottom: 0;
    }
    .pm-controls {
      display: flex;
      gap: 0.5rem;
    }
    .btn-pm {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: #fff;
      font-weight: 800;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-m);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s var(--ease);
      user-select: none;
    }
    .btn-pm:hover {
      background: var(--accent);
      border-color: var(--accent);
    }
    .btn-pm-minus:hover {
      background: #ef4444;
      border-color: #ef4444;
    }

    /* ── STACKED EDITABLE ANNOUNCEMENT BOXES ── */
    .announcements-box-stack {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .announcement-input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-m);
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s var(--ease);
    }
    .announcement-input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.15);
    }

    .status-msg { font-size: 0.9rem; margin-top: 0.5rem; }
    .status-success { color: #4ade80; }
    .status-error { color: #f87171; }
    .logged-out-msg { text-align: center; padding: 3rem 0; }

    @media (max-width: 768px) {
      .background-grid-wrapper { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="#" class="active">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="settings-hero">
    <h1>Account Settings</h1>
    <p>Change your configuration and interface options</p>
  </section>

  <main class="settings-container">
    <div id="settings-wrapper" class="settings-card">
      <div class="logged-out-msg">
        <p>Please sign in to view and change your settings.</p>
        <br>
        <a href="../login/" class="btn-primary">Sign In</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    /* SUPABASE CONFIG */
    const supabaseUrl = "https://hbynnertatvxpvtqctyg.supabase.co";
    const supabaseKey = "sb_publishable_WnnU16Mfj1rmRJcEStOzeQ_BExLbP2C";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const settingsWrapper = document.getElementById('settings-wrapper');
    const navAuthContainer = document.getElementById('auth-button-container');

    const localThemeCached = localStorage.getItem('carson_theme');
    if (localThemeCached && localThemeCached !== 'default') {
      document.body.className = 'theme-' + localThemeCached;
    }

    const THEME_DATA_MAP = [
      { id: 'default', type: 'color', val: '#06060c', label: 'default' },
      { id: 'red', type: 'color', val: '#1c0505', label: 'red' },
      { id: 'orange', type: 'color', val: '#1c0f05', label: 'orange' },
      { id: 'yellow', type: 'color', val: '#161402', label: 'yellow' },
      { id: 'green', type: 'color', val: '#03140a', label: 'green' },
      { id: 'blue', type: 'color', val: '#030a1c', label: 'blue' },
      { id: 'purple', type: 'color', val: '#0f031c', label: 'purple' },
      { id: 'stars', type: 'img', val: '../assets/stars.png', label: 'stars' },
      { id: 'lightning', type: 'img', val: '../assets/lightning.png', label: 'lightning' },
      { id: 'teal-magenta', type: 'img', val: '../assets/teal-magenta.png', label: 'teal + magenta' },
      { id: 'blue-pink', type: 'img', val: '../assets/blue-pink.png', label: 'blue + pink' },
      { id: 'blue-spots', type: 'img', val: '../assets/blue-spots.png', label: 'blue spots' },
      { id: 'white-spots', type: 'img', val: '../assets/white-spots.png', label: 'white spots' }
    ];

    const renderSettingsInterface = async (user) => {
      if (!user) return;

      navAuthContainer.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
      navAuthContainer.style.display = '';
      
      const { data: profile } = await supabase.from("users").select("*").eq("id", user.id).single();
      const currentBgSetting = (profile && profile.background) ? profile.background : 'default';
      const currentUserRole = (profile && profile.role) ? profile.role : 'user';

      localStorage.setItem('carson_theme', currentBgSetting);
      document.body.className = currentBgSetting === 'default' ? '' : 'theme-' + currentBgSetting;

      settingsWrapper.innerHTML = `
        <form id="username-form" class="settings-section">
          <h3>Change Username</h3>
          <div class="form-group">
            <label for="username">New Username</label>
            <input type="text" id="username" value="${profile?.username || ''}" required>
          </div>
          <div class="btn-container"><button type="submit" class="btn-primary">Update Username</button></div>
          <div id="username-msg" class="status-msg"></div>
        </form>

        <div class="settings-section">
          <h3>Background Gallery</h3>
          <div class="background-grid-wrapper" id="thumb-matrix-target"></div>
          <div id="background-msg" class="status-msg"></div>
        </div>

        <div id="owner-panel-injection-point"></div>
      `;

      // Render Background Theme Selector
      const thumbContainer = document.getElementById("thumb-matrix-target");
      THEME_DATA_MAP.forEach(theme => {
        const thumb = document.createElement("div");
        thumb.className = `background-thumb-card ${currentBgSetting === theme.id ? 'active' : ''}`;
        thumb.dataset.id = theme.id;

        let canvasStyle = "";
        if (theme.type === 'color') canvasStyle = `background-color: ${theme.val};`;
        if (theme.type === 'gradient') canvasStyle = `background: ${theme.val};`;
        if (theme.type === 'img') canvasStyle = `background-image: url('${theme.val}');`;

        thumb.innerHTML = `<div class="thumb-canvas" style="${canvasStyle}"></div><div class="thumb-label">${theme.label}</div>`;
        
        thumb.onclick = async () => {
          document.querySelectorAll('.background-thumb-card').forEach(c => c.classList.remove('active'));
          thumb.classList.add('active');
          const bgMsg = document.getElementById("background-msg");

          try {
            document.body.className = theme.id === 'default' ? '' : 'theme-' + theme.id;
            localStorage.setItem('carson_theme', theme.id);
            await supabase.from("users").update({ background: theme.id }).eq("id", user.id);
            bgMsg.textContent = "Theme updated!";
            bgMsg.className = "status-msg status-success";
          } catch(err) {
            bgMsg.textContent = "Error saving theme.";
            bgMsg.className = "status-msg status-error";
          }
        };
        thumbContainer.appendChild(thumb);
      });

      // Render Owner Controls if role is 'owner'
      if (currentUserRole === 'owner') {
        const ownerSection = document.getElementById("owner-panel-injection-point");
        ownerSection.innerHTML = `
          <div class="settings-section">
            <div class="section-header-controls">
              <h3>Manage Announcements</h3>
              <div class="pm-controls">
                <button type="button" id="btn-add-box" class="btn-pm" title="Add text box underneath">+</button>
                <button type="button" id="btn-remove-box" class="btn-pm btn-pm-minus" title="Remove bottom text box">-</button>
              </div>
            </div>
            
            <div id="announcements-stack" class="announcements-box-stack">
              <div style="color:var(--text-muted); font-size:0.9rem;">Loading announcements...</div>
            </div>

            <div class="btn-container">
              <button type="button" id="btn-save-announcements" class="btn-primary">Save Changes</button>
            </div>
            <div id="announcement-msg" class="status-msg"></div>
          </div>
        `;

        await loadAndPopulateAnnouncements();

        document.getElementById("btn-add-box").onclick = () => {
          const stack = document.getElementById("announcements-stack");
          const newInput = document.createElement("input");
          newInput.type = "text";
          newInput.className = "announcement-input-field";
          newInput.placeholder = "Type announcement text...";
          stack.appendChild(newInput);
          newInput.focus();
        };

        document.getElementById("btn-remove-box").onclick = () => {
          const stack = document.getElementById("announcements-stack");
          const inputs = stack.querySelectorAll(".announcement-input-field");
          if (inputs.length > 0) {
            inputs[inputs.length - 1].remove();
          }
        };

        document.getElementById("btn-save-announcements").onclick = async () => {
          const msgEl = document.getElementById("announcement-msg");
          const stack = document.getElementById("announcements-stack");
          const inputs = stack.querySelectorAll(".announcement-input-field");

          const updatedTexts = Array.from(inputs)
            .map(i => i.value.trim())
            .filter(text => text.length > 0);

          try {
            msgEl.textContent = "Saving changes...";
            msgEl.className = "status-msg";

            const { error: deleteError } = await supabase.from("announcements").delete().neq("id", "00000000-0000-0000-0000-000000000000");
            if (deleteError) throw deleteError;

            if (updatedTexts.length > 0) {
              const rowsToInsert = updatedTexts.map(text => ({ text }));
              const { error: insertError } = await supabase.from("announcements").insert(rowsToInsert);
              if (insertError) throw insertError;
            }

            msgEl.textContent = "Announcements updated successfully!";
            msgEl.className = "status-msg status-success";
            await loadAndPopulateAnnouncements();
          } catch (err) {
            console.error("Save announcements error:", err);
            msgEl.textContent = "Failed to save: " + err.message;
            msgEl.className = "status-msg status-error";
          }
        };
      }

      // Username Form Submission
      document.getElementById('username-form').onsubmit = async (e) => {
        e.preventDefault();
        const newUsername = document.getElementById('username').value.trim();
        const msgEl = document.getElementById('username-msg');
        try {
          await supabase.from("users").update({ username: newUsername }).eq("id", user.id);
          msgEl.textContent = 'Username updated!';
          msgEl.className = 'status-msg status-success';
        } catch (err) {
          msgEl.textContent = 'Failed to update username.';
          msgEl.className = 'status-msg status-error';
        }
      };
    };

    /* FETCH ANNOUNCEMENTS FROM DATABASE & POPULATE INPUT FIELDS */
    async function loadAndPopulateAnnouncements() {
      const stack = document.getElementById("announcements-stack");
      if (!stack) return;

      const { data: records, error } = await supabase
        .from("announcements")
        .select("*")
        .order("created_at", { ascending: true });

      stack.innerHTML = "";

      if (error) {
        stack.innerHTML = `<div style="color:#ef4444; font-size:0.9rem;">Error loading entries: ${error.message}</div>`;
        return;
      }

      if (!records || records.length === 0) {
        const defaultInput = document.createElement("input");
        defaultInput.type = "text";
        defaultInput.className = "announcement-input-field";
        defaultInput.placeholder = "Type announcement text...";
        stack.appendChild(defaultInput);
        return;
      }

      records.forEach(item => {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "announcement-input-field";
        input.value = item.text;
        stack.appendChild(input);
      });
    }

    supabase.auth.onAuthStateChange((event, session) => {
      renderSettingsInterface(session?.user || null);
    });
  </script>
</body>
</html>
