<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Omoggle</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  
  <script src="peerjs.min.js"></script>

  <style>
    /* ── SHOWDOWN STYLES ────────────────────────────────── */
    /* OPTIMIZATION: Configured maximum constraints and auto-scrolling to trap panels on tiny viewports seamlessly */
    .showdown-container { max-width: 1000px; margin: 1rem auto; padding: 0 1.5rem; width: 100%; box-sizing: border-box; }
    .showdown-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-l); padding: 2rem 1.5rem; text-align: center; position: relative; overflow-y: auto; max-height: calc(100dvh - 110px); display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .view-stage { width: 100%; display: none; flex-direction: column; align-items: center; }
    .view-stage.active { display: flex; }
    .showdown-title { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff 30%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .showdown-desc { color: var(--text-muted); max-width: 500px; margin-bottom: 1.5rem; line-height: 1.6; font-size: 0.95rem; }
    .status-display-msg { color: #ef4444; margin-top: 1rem; font-size: 0.95rem; font-weight: 600; min-height: 1.5rem; }
    .radar-spinner { width: 70px; height: 70px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* OPTIMIZATION: Flex responsive design patterns applied for compact vertical spacing limitations */
    .battleground { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 100%; margin-bottom: 1.5rem; }
    @media (max-height: 700px) {
      .battleground { gap: 0.75rem; margin-bottom: 0.75rem; }
      .showdown-title { font-size: 1.6rem; }
      .showdown-desc { margin-bottom: 1rem; }
    }
    .player-slot { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-m); aspect-ratio: 4/3; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
    .player-slot.winning { border-color: var(--accent); }
    .player-slot video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; background: var(--surface); }
    .player-label { position: absolute; top: 12px; left: 12px; background: rgba(0, 0, 0, 0.6); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; z-index: 2; }
    .player-label.opponent { left: auto; right: 12px; }
    .live-metrics { margin-top: auto; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; margin-bottom: 12px; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: var(--text-muted); z-index: 2; position: relative; }
    .winning .live-metrics { color: var(--accent); }

    .timer-banner { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
    .scale-wrapper { width: 80%; max-width: 500px; margin: 0 auto; position: relative; }
    .scale-labels { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; }
    .scale-track { height: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; position: relative; width: 100%; }
    .scale-center-notch { position: absolute; left: 50%; top: -4px; width: 2px; height: 16px; background: var(--text-muted); transform: translateX(-50%); }
    .scale-needle { position: absolute; top: -6px; width: 20px; height: 20px; background: var(--accent); border: 3px solid #fff; border-radius: 50%; transform: translateX(-50%); transition: left 0.25s ease; }
    .result-announcement { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; margin-bottom: 1rem; display: none; }
    .action-row { margin-top: 1.5rem; display: flex; gap: 12px; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="#" class="active">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="../settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="showdown-container">
    <div class="showdown-card">

      <div id="stage-lobby" class="view-stage active">
        <h2 class="showdown-title">OMOGGLE</h2>
        <p class="showdown-desc">COMPETE AGAINST OTHER PEOPLE TO SEE WHO HAS MORE AURA AFTER 15 SECONDS OF LIVE VIDEO</p>
        <button id="btn-start" class="btn-primary">Find a Competitor</button>
        <p id="lobby-msg" class="status-display-msg"></p>
      </div>

      <div id="stage-searching" class="view-stage">
        <div class="radar-spinner"></div>
        <h3 class="showdown-title" style="font-size: 1.8rem;">Finding Competitor...</h3>
        <p class="showdown-desc">Searching for an available match...</p>
        <button id="btn-cancel" class="btn-primary" style="background: var(--surface); border: 1px solid var(--border);">Cancel Search</button>
      </div>

      <div id="stage-match" class="view-stage">
        <div id="countdown" class="timer-banner">15s</div>
        
        <div class="battleground">
          <div id="slot-user" class="player-slot">
            <span class="player-label">You</span>
            <video id="user-video" autoplay playsinline muted></video>
            <div id="user-aura-val" class="live-metrics">Aura: +500</div>
          </div>

          <div id="slot-opponent" class="player-slot">
            <span class="player-label opponent" id="opponent-name">Unknown</span>
            <video id="opponent-video" autoplay playsinline></video>
            <div id="opp-aura-val" class="live-metrics">Aura: +500</div>
          </div>
        </div>

        <div class="scale-wrapper">
          <div class="scale-labels">
            <span>Your Aura</span>
            <span>Opponent Aura</span>
          </div>
          <div class="scale-track">
            <div class="scale-center-notch"></div>
            <div id="scale-needle" class="scale-needle" style="left: 50%;"></div>
          </div>
        </div>

        <h3 id="result-text" class="result-announcement"></h3>

        <div class="action-row">
          <button id="btn-next" class="btn-primary" style="display: none;">Next Match</button>
          <button id="btn-exit" class="btn-primary" style="display: none; background: var(--surface); border: 1px solid var(--border);">Leave</button>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { AuraEngine } from "./auraEngine.js";

    const OUTCOME_PHRASES = {
      wonByATon: ["INSANE AURA! YOU ABSOLUTELY CLAPPED THEM!", "INFINITE RIZZ! THEY DIDN'T STAND A CHANCE", "EXTREME AURA! THEY'RE COOKED"],
      won: ["YOU WIN! NO CAP", "W RIZZ!", "AURA FARM"],
      barelyWon: ["BARELY WON! JUST EDGING OUT THE VICTORY", "EXTREMELY CLOSE! YOUR AURA WAS BARELY ENOUGH"],
      tie: ["IT'S A TIE!"],
      barelyLost: ["BARELY LOST! JUST BARELY LESS AURA", "SO CLOSE! GET BETTER"],
      lost: ["YOU LOST! GET BETTER", "L AURA. TIME TO GET BETTER"],
      lostByATon: ["YOU LOST!!! WATCH SOME YT TUTORIALS", "NEGATIVE AURA! CLAPPED", "GET BETTER UNC"]
    };

    /* SUPABASE CONFIG */
    const supabaseUrl = "https://hbynnertatvxpvtqctyg.supabase.co";
    const supabaseKey = "sb_publishable_WnnU16Mfj1rmRJcEStOzeQ_BExLbP2C";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const stageLobby = document.getElementById('stage-lobby');
    const stageSearching = document.getElementById('stage-searching');
    const stageMatch = document.getElementById('stage-match');
    const btnStart = document.getElementById('btn-start');
    const btnCancel = document.getElementById('btn-cancel');
    const btnNext = document.getElementById('btn-next');
    const btnExit = document.getElementById('btn-exit');
    const countdownText = document.getElementById('countdown');
    const scaleNeedle = document.getElementById('scale-needle');
    const opponentNameTag = document.getElementById('opponent-name');
    const userSlot = document.getElementById('slot-user');
    const opponentSlot = document.getElementById('slot-opponent');
    const userAuraText = document.getElementById('user-aura-val');
    const oppAuraText = document.getElementById('opp-aura-val');
    const resultText = document.getElementById('result-text');
    const lobbyMsg = document.getElementById('lobby-msg');
    const userVideo = document.getElementById('user-video');
    const opponentVideo = document.getElementById('opponent-video');

    const urlParams = new URLSearchParams(window.location.search);
    const privateRoomId = urlParams.get('room');
    const privateRole = urlParams.get('role');
    const linkedHostName = urlParams.get('hostName'); // OPTIMIZATION: Read fallback parameter instantly from search link profiles

    let peer = null;
    let myPeerId = null;
    let currentConnection = null;
    let isHost = false;
    let activeQueueDocRef = null;
    let queueListenerUnsubscribe = null;
    let inQueueProcess = false;
    let myMediaStream = null;

    let matchInterval;
    let timerInterval;
    let currentScore = 50;
    let currentUserProfile = { id: null, username: "Unknown" };

    /* ── SECURE HARDWARE STREAM LIFECYCLE CLEANER ───────────────── */
    function safelyStopCameraTracks() {
      if (myMediaStream) {
        myMediaStream.getTracks().forEach(track => {
          track.stop();
          console.log("Hardware track released successfully.");
        });
        myMediaStream = null;
      }
      if (userVideo) userVideo.srcObject = null;
      if (opponentVideo) opponentVideo.srcObject = null;
    }

    async function safeAcquireCameraStream() {
      if (myMediaStream) return true;
      try {
        myMediaStream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 24 } },
          audio: false
        });
        userVideo.srcObject = myMediaStream;
        return true;
      } catch (e) {
        console.error("Camera acquisition failure:", e);
        return false;
      }
    }

    async function initPeerSession() {
      if (privateRoomId && privateRole === "host") {
        myPeerId = privateRoomId;
        isHost = true;
        peer = new Peer(privateRoomId);
      } else {
        peer = new Peer();
      }

      peer.on('open', (id) => {
        if (!privateRoomId) myPeerId = id;
        if (privateRoomId && privateRole === "guest") executePrivateGuestHandshake();
      });

      peer.on('connection', (conn) => {
        isHost = true;
        setupDataChannel(conn);
      });

      peer.on('call', (incomingCall) => {
        if (myMediaStream) {
          incomingCall.answer(myMediaStream);
          incomingCall.on('stream', (remoteStream) => { opponentVideo.srcObject = remoteStream; });
        }
      });
    }

    const authButtonContainer = document.getElementById('auth-button-container');
    if (authButtonContainer) {
      authButtonContainer.innerHTML = '';
      authButtonContainer.style.display = 'none';
    }

    const renderAuthState = async (user) => {
      if (!authButtonContainer) return;
      if (!user) {
        authButtonContainer.innerHTML = '<a href="../login/" class="nav-auth-btn">Sign In</a>';
        authButtonContainer.style.display = '';
        return;
      }

      currentUserProfile.id = user.id;
      const { data: userSnap } = await supabase
        .from("users")
        .select("username")
        .eq("id", user.id)
        .single();
        
      currentUserProfile.username = userSnap ? userSnap.username : user.email.split('@')[0];

      authButtonContainer.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
      authButtonContainer.style.display = '';
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.onclick = async () => { 
          safelyStopCameraTracks();
          await supabase.auth.signOut(); 
          window.location.reload(); 
        };
      }

      if (privateRoomId) {
        switchStage(stageMatch);
        if (linkedHostName) {
          opponentNameTag.innerText = decodeURIComponent(linkedHostName);
        } else {
          opponentNameTag.innerText = privateRole === "host" ? "Challenger" : "Host";
        }
      }

      await initPeerSession();
    };

    supabase.auth.onAuthStateChange(async (event, session) => {
      const user = session?.user || null;
      if (!user) { 
        authButtonContainer.innerHTML = '<a href="../login/" class="nav-auth-btn">Sign In</a>'; 
        authButtonContainer.style.display = ''; 
        return; 
      }
      await renderAuthState(user);
    });

    async function executePrivateGuestHandshake() {
      switchStage(stageMatch);
      const videoAcquired = await safeAcquireCameraStream();
      if (!videoAcquired) { alert("Camera access required for Omoggle duels."); return; }

      isHost = false;
      const conn = peer.connect(privateRoomId);
      setupDataChannel(conn);
    }

    function switchStage(stage) {
      stageLobby.classList.remove('active'); stageSearching.classList.remove('active'); stageMatch.classList.remove('active');
      stage.classList.add('active');
    }

    /* ── MATCHMAKING CORE PIPELINE ───────────────────────── */
    async function startMatchmaking() {
      if (privateRoomId) return; 
      if (inQueueProcess || !myPeerId) return; 
      inQueueProcess = true;

      const videoAcquired = await safeAcquireCameraStream();
      if (!videoAcquired) { 
        lobbyMsg.innerText = "Camera initialization failed. Please verify browser settings."; 
        inQueueProcess = false; 
        return; 
      }

      switchStage(stageSearching);

      try {
        // Find existing match waiting for opponents
        const { data: queueItems } = await supabase
          .from("showdown_queue")
          .select("*")
          .eq("status", "waiting")
          .neq("hostUid", currentUserProfile.id)
          .limit(5);

        let selectedDoc = queueItems?.[0];

        if (selectedDoc) {
          // PostgreSQL conditional matching update acts natively as a transactional lock
          const { data: matchedRows } = await supabase
            .from("showdown_queue")
            .update({
              status: "matched",
              guestPeerId: myPeerId,
              guestUid: currentUserProfile.id,
              guestName: currentUserProfile.username
            })
            .eq("id", selectedDoc.id)
            .eq("status", "waiting")
            .select();

          if (matchedRows && matchedRows.length > 0) {
            const successData = matchedRows[0];
            isHost = false;
            opponentNameTag.innerText = successData.hostName || "Player";
            setupDataChannel(peer.connect(successData.hostPeerId));
            inQueueProcess = false;
            return;
          }
        }

        // Otherwise provision hosting parameters if no entry is active
        isHost = true;
        const { data: newQueueItem } = await supabase
          .from("showdown_queue")
          .insert([{
            status: "waiting",
            hostPeerId: myPeerId,
            hostUid: currentUserProfile.id,
            hostName: currentUserProfile.username,
            guestPeerId: "",
            guestUid: "",
            createdAt: Date.now()
          }])
          .select()
          .single();

        if (newQueueItem) {
          activeQueueDocRef = newQueueItem.id;
          
          if (queueListenerUnsubscribe) queueListenerUnsubscribe.unsubscribe();
          
          // Stream structural tracking listener
          queueListenerUnsubscribe = supabase
            .channel(`public:showdown_queue:id=eq.${newQueueItem.id}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'showdown_queue', filter: `id=eq.${newQueueItem.id}` }, async (payload) => {
              const d = payload.new;
              if (d && d.status === "matched") {
                opponentNameTag.innerText = d.guestName || "Player";
                await supabase.from("showdown_queue").delete().eq("id", newQueueItem.id);
                if (queueListenerUnsubscribe) queueListenerUnsubscribe.unsubscribe();
              }
            })
            .subscribe();
        }
      } catch (err) { 
        cancelSearch(); 
      }
      inQueueProcess = false;
    }

    async function cancelSearch() {
      if (queueListenerUnsubscribe) {
        queueListenerUnsubscribe.unsubscribe();
        queueListenerUnsubscribe = null;
      }
      if (isHost && activeQueueDocRef) {
        await supabase.from("showdown_queue").delete().eq("id", activeQueueDocRef);
        activeQueueDocRef = null;
      }
      safelyStopCameraTracks();
      switchStage(stageLobby);
    }

    function setupDataChannel(conn) {
      currentConnection = conn;
      currentConnection.on('open', () => {
        /* OPTIMIZATION: Transmit username profile information over raw P2P buffers directly upon handshake confirmation */
        currentConnection.send({ type: 'init_name', username: currentUserProfile.username });

        if (!isHost && myMediaStream) {
          const call = peer.call(conn.peer, myMediaStream);
          call.on('stream', (stream) => { opponentVideo.srcObject = stream; });
        }
        runShowdownEngine();
      });

      currentConnection.on('data', (data) => {
        if (data.type === 'init_name') {
          opponentNameTag.innerText = data.username;
        }
        if (data.type === 'sync_score') { currentScore = data.score; renderUIFrames(); }
      });

      currentConnection.on('close', () => {
        clearLoops();
        safelyStopCameraTracks();
        switchStage(stageLobby);
      });
    }

    function runShowdownEngine() {
      switchStage(stageMatch);
      countdownText.style.display = 'block'; resultText.style.display = 'none'; btnNext.style.display = 'none'; btnExit.style.display = 'none';
      currentScore = 50; scaleNeedle.style.left = '50%';
      
      if (privateRoomId) {
        btnNext.style.setProperty("display", "none", "important");
      }

      let timeLeft = 15;
      countdownText.innerText = timeLeft + "s";

      timerInterval = setInterval(() => {
        timeLeft--; countdownText.innerText = timeLeft + "s";
        if (timeLeft <= 0) terminateShowdown();
      }, 1000);

      matchInterval = setInterval(() => {
        if (isHost) {
          currentScore = AuraEngine.calculateMatchFlux(currentScore);
          if (currentConnection?.open) currentConnection.send({ type: 'sync_score', score: currentScore });
          renderUIFrames();
        }
      }, 350);
    }

    function renderUIFrames() {
      let calculatedPos = isHost ? currentScore : (100 - currentScore);
      scaleNeedle.style.left = calculatedPos + '%';
      userAuraText.innerText = `Aura: +${Math.round((100 - calculatedPos) * 10)}`;
      oppAuraText.innerText = `Aura: +${Math.round(calculatedPos * 10)}`;

      userSlot.className = `player-slot ${calculatedPos < 48 ? 'winning' : ''}`;
      opponentSlot.className = `player-slot ${calculatedPos > 52 ? 'winning' : ''}`;
    }

    function terminateShowdown() {
      clearLoops();
      countdownText.style.display = 'none'; resultText.style.display = 'block';
      btnExit.style.display = 'inline-block';
      if (!privateRoomId) btnNext.style.display = 'inline-block';

      let finalPosition = isHost ? currentScore : (100 - currentScore);
      let phrases = OUTCOME_PHRASES.tie;
      if (finalPosition < 20) phrases = OUTCOME_PHRASES.wonByATon;
      else if (finalPosition < 40) phrases = OUTCOME_PHRASES.won;
      else if (finalPosition < 48) phrases = OUTCOME_PHRASES.barelyWon;
      else if (finalPosition > 52 && finalPosition <= 60) phrases = OUTCOME_PHRASES.barelyLost;
      else if (finalPosition > 60 && finalPosition <= 80) phrases = OUTCOME_PHRASES.lost;
      else if (finalPosition > 80) phrases = OUTCOME_PHRASES.lostByATon;

      resultText.innerText = phrases[Math.floor(Math.random() * phrases.length)];
      resultText.style.color = finalPosition < 48 ? "var(--accent)" : finalPosition > 52 ? "#ef4444" : "var(--text-muted)";
    }

    function clearLoops() { clearInterval(timerInterval); clearInterval(matchInterval); }
    
    function cleanExit() { 
      if (currentConnection) currentConnection.close(); 
      clearLoops(); 
      safelyStopCameraTracks();
      window.location.href = privateRoomId ? "../chat/" : "#"; 
      switchStage(stageLobby); 
    }

    btnStart.addEventListener('click', startMatchmaking);
    btnCancel.addEventListener('click', cancelSearch);
    btnNext.addEventListener('click', async () => {
      clearLoops();
      safelyStopCameraTracks();
      await startMatchmaking();
    });
    btnExit.addEventListener('click', cleanExit);
  </script>
</body>
</html>
