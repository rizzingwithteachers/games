<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Omoggle</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  
  <script src="peerjs.min.js"></script>

  <style>
    /* ── SHOWDOWN STYLES ────────────────────────────────── */
    .showdown-container {
      max-width: 1000px;
      margin: 2.5rem auto 4rem;
      padding: 0 2rem;
      width: 100%;
      box-sizing: border-box;
    }

    .showdown-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-l);
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .view-stage {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .view-stage.active {
      display: flex;
    }

    .showdown-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .showdown-desc {
      color: var(--text-muted);
      max-width: 500px;
      margin-bottom: 2.5rem;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    /* On-Screen Status Alert Box */
    .status-display-msg {
      color: #ef4444;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 1.5rem;
      transition: color 0.2s ease;
    }

    .radar-spinner {
      width: 70px;
      height: 70px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .battleground {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      margin-bottom: 2.5rem;
    }

    .player-slot {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-m);
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .player-slot.winning {
      border-color: var(--accent);
    }

    /* Video stream layout settings */
    .player-slot video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #000;
    }

    .player-label {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 2;
    }

    .player-label.opponent {
      left: auto;
      right: 12px;
    }

    .live-metrics {
      margin-top: 1.2rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    .winning .live-metrics {
      color: var(--accent);
    }

    .timer-banner {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .scale-wrapper {
      width: 80%;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .scale-track {
      height: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      position: relative;
      width: 100%;
    }

    .scale-center-notch {
      position: absolute;
      left: 50%;
      top: -4px;
      width: 2px;
      height: 16px;
      background: var(--text-muted);
      transform: translateX(-50%);
    }

    .scale-needle {
      position: absolute;
      top: -6px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border: 3px solid #fff;
      border-radius: 50%;
      transform: translateX(-50%);
      transition: left 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .result-announcement {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      display: none;
    }

    .action-row {
      margin-top: 2rem;
      display: flex;
      gap: 12px;
    }

    /* ── IPAD 9TH GENERATION OPTIMIZATIONS ───────────────── */
    @media only screen and (min-width: 768px) and (max-width: 1080px) {
      .showdown-container {
        max-width: 100%;
        margin: 1.5rem auto 3rem;
        padding: 0 1.5rem;
      }
      .showdown-card {
        padding: 2.5rem 1.5rem;
        min-height: 420px;
      }
      .battleground {
        gap: 1.25rem;
        margin-bottom: 2rem;
      }
      .player-slot {
        aspect-ratio: 4/3;
      }
      .btn-primary {
        padding: 14px 28px;
        font-size: 0.95rem;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="#" class="active">Omoggle</a></li>
          <li><a href="../chat/">Chat</a></li>
          <li><a href="../settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="showdown-container">
    <div class="showdown-card">

      <div id="stage-lobby" class="view-stage active">
        <h2 class="showdown-title">OMOGGLE</h2>
        <p class="showdown-desc">COMPETE AGAINST OTHER PEOPLE TO SEE WHO HAS MORE AURA AFTER 15 SECONDS OF LIVE VIDEO</p>
        <button id="btn-start" class="btn-primary">Find a Competitor</button>
        <p id="lobby-msg" class="status-display-msg"></p>
      </div>

      <div id="stage-searching" class="view-stage">
        <div class="radar-spinner"></div>
        <h3 class="showdown-title" style="font-size: 1.8rem;">Finding Competitor...</h3>
        <p class="showdown-desc">Searching for an available match...</p>
        <button id="btn-cancel" class="btn-primary" style="background: var(--surface); border: 1px solid var(--border);">Cancel Search</button>
      </div>

      <div id="stage-match" class="view-stage">
        <div id="countdown" class="timer-banner">15s</div>
        
        <div class="battleground">
          <div id="slot-user" class="player-slot">
            <span class="player-label">You</span>
            <video id="user-video" autoplay playsinline muted></video>
            <div id="user-aura-val" class="live-metrics" style="z-index: 2; position: relative; margin-top: auto; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; margin-bottom: 12px;">Aura: +500</div>
          </div>

          <div id="slot-opponent" class="player-slot">
            <span class="player-label opponent" id="opponent-name">Unknown</span>
            <video id="opponent-video" autoplay playsinline></video>
            <div id="opp-aura-val" class="live-metrics" style="z-index: 2; position: relative; margin-top: auto; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; margin-bottom: 12px;">Aura: +500</div>
          </div>
        </div>

        <div class="scale-wrapper">
          <div class="scale-labels">
            <span>Your Aura</span>
            <span>Opponent Aura</span>
          </div>
          <div class="scale-track">
            <div class="scale-center-notch"></div>
            <div id="scale-needle" class="scale-needle" style="left: 50%;"></div>
          </div>
        </div>

        <h3 id="result-text" class="result-announcement"></h3>

        <div class="action-row">
          <button id="btn-next" class="btn-primary" style="display: none;">Next Match</button>
          <button id="btn-exit" class="btn-primary" style="display: none; background: var(--surface); border: 1px solid var(--border);">Leave</button>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, limit, doc, getDoc, runTransaction, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { AuraEngine } from "./auraEngine.js";

    // ── EDIT YOUR RANDOM RESPONSES HERE ───────────────────────────
    const OUTCOME_PHRASES = {
      wonByATon: [
        "INSANE AURA! YOU ABSOLUTELY CLAPPED THEM!",
        "INFINITE RIZZ! THEY DIDN'T STAND A CHANCE",
        "EXTREME AURA! THEY'RE COOKED"
      ],
      won: [
        "YOU WIN! NO CAP",
        "W RIZZ!",
        "AURA FARM"
      ],
      barelyWon: [
        "BARELY WON! JUST EDGING OUT THE VICTORY",
        "EXTREMELY CLOSE! YOUR AURA WAS BARELY ENOUGH",
        "TOO CLOSE! YOU NEARLY GOT OBLITERATED"
      ],
      tie: [
        "IT'S A TIE!",
        "IT'S A TIE!",
        "IT'S A TIE!"
      ],
      barelyLost: [
        "BARELY LOST! JUST BARELY LESS AURA",
        "SO CLOSE! GET BETTER",
        "BARELY LOST! YOU WERE SO CLOSE"
      ],
      lost: [
        "YOU LOST! GET BETTER",
        "YOU COULDN'T RIZZ. ):",
        "L AURA. TIME TO GET BETTER"
      ],
      lostByATon: [
        "YOU LOST!!! WATCH SOME YT TUTORIALS",
        "NEGATIVE AURA! THEY ABSOLUTELY CLAPPED YOU",
        "GET BETTER UNC"
      ]
    };
    // ─────────────────────────────────────────────────────────────

    const firebaseConfig = {
      apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
      authDomain: "carson-games.firebaseapp.com",
      projectId: "carson-games",
      storageBucket: "carson-games.firebasestorage.app",
      messagingSenderId: "856520252558",
      appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
    };

    // Initialize Systems
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM References
    const stageLobby = document.getElementById('stage-lobby');
    const stageSearching = document.getElementById('stage-searching');
    const stageMatch = document.getElementById('stage-match');
    const btnStart = document.getElementById('btn-start');
    const btnCancel = document.getElementById('btn-cancel');
    const btnNext = document.getElementById('btn-next');
    const btnExit = document.getElementById('btn-exit');
    const countdownText = document.getElementById('countdown');
    const scaleNeedle = document.getElementById('scale-needle');
    const opponentNameTag = document.getElementById('opponent-name');
    const userSlot = document.getElementById('slot-user');
    const opponentSlot = document.getElementById('slot-opponent');
    const userAuraText = document.getElementById('user-aura-val');
    const oppAuraText = document.getElementById('opp-aura-val');
    const resultText = document.getElementById('result-text');
    const lobbyMsg = document.getElementById('lobby-msg');

    const userVideo = document.getElementById('user-video');
    const opponentVideo = document.getElementById('opponent-video');

    // WebRTC Application States
    let peer = null;
    let myPeerId = null;
    let currentConnection = null;
    let isHost = false;
    let activeQueueDocRef = null;
    let queueListenerUnsubscribe = null;
    let inQueueProcess = false;
    let myMediaStream = null;

    let matchInterval;
    let timerInterval;
    let currentScore = 50;
    let currentUserProfile = { uid: null, username: "Unknown" };

    // Initialize PeerJS Session
    function initPeer() {
      peer = new Peer();
      peer.on('open', (id) => {
        myPeerId = id;
      });

      peer.on('connection', (conn) => {
        isHost = true;
        setupDataChannel(conn);
      });

      peer.on('call', (incomingCall) => {
        if (myMediaStream) {
          incomingCall.answer(myMediaStream);
          incomingCall.on('stream', (remoteStream) => {
            opponentVideo.srcObject = remoteStream;
          });
        }
      });
    }
    initPeer();

    // Track Authentication States & Handle Redirects
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("../login/");
        return;
      }

      const container = document.getElementById('auth-button-container');
      container.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
      
      currentUserProfile.uid = user.uid;
      currentUserProfile.username = "Unknown";

      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists() && userDoc.data().username) {
          currentUserProfile.username = userDoc.data().username;
        } else {
          currentUserProfile.username = user.email.split('@')[0] || "Unknown";
        }
      } catch (e) {
        console.error("Error loading user profile information:", e);
      }

      document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
          await signOut(auth);
          window.location.reload();
        } catch (err) {
          console.error('Logout error:', err);
        }
      });
    });

    async function resolveUsername(uid) {
      if (!uid) return "Unknown";
      try {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists() && userSnap.data().username) {
          return userSnap.data().username;
        }
      } catch(e) {
        console.error("Error fetching remote username:", e);
      }
      return "Unknown";
    }

    function switchStage(stage) {
      stageLobby.classList.remove('active');
      stageSearching.classList.remove('active');
      stageMatch.classList.remove('active');
      stage.classList.add('active');
    }

    // Matchmaking Logic Loop via Firestore
    async function startMatchmaking() {
      if (inQueueProcess || !myPeerId || !currentUserProfile.uid) return; 
      inQueueProcess = true;
      btnStart.disabled = true;
      btnNext.disabled = true;
      lobbyMsg.innerText = ""; 

      if (!myMediaStream) {
        try {
          myMediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          userVideo.srcObject = myMediaStream;
        } catch (cameraErr) {
          lobbyMsg.style.color = "#ef4444";
          lobbyMsg.innerText = "Camera access required to join the queue.";
          btnStart.disabled = false;
          btnNext.disabled = false;
          inQueueProcess = false;
          return;
        }
      }

      try {
        // ── FAILSAFE CLEANUP FOR STUCK SESSIONS ───────────────────────────
        // Look for ANY old sessions hosted by this user that got stuck in 'waiting'
        const selfCheckQuery = query(
          collection(db, "showdown_queue"), 
          where("hostUid", "==", currentUserProfile.uid), 
          where("status", "==", "waiting")
        );
        const selfCheckSnapshot = await getDocs(selfCheckQuery);
        
        // Wipe out old records so they don't block the line or trigger ghost matches
        if (!selfCheckSnapshot.empty) {
          const batchPromises = selfCheckSnapshot.docs.map(d => deleteDoc(doc(db, "showdown_queue", d.id)));
          await Promise.all(batchPromises);
        }
        // ─────────────────────────────────────────────────────────────

        switchStage(stageSearching);

        const q = query(collection(db, "showdown_queue"), where("status", "==", "waiting"), limit(5));
        const querySnapshot = await getDocs(q);

        let selectedDoc = null;
        if (!querySnapshot.empty) {
          for (let d of querySnapshot.docs) {
            if (d.data().hostUid !== currentUserProfile.uid) {
              selectedDoc = d;
              break;
            }
          }
        }

        if (selectedDoc) {
          const docRef = doc(db, "showdown_queue", selectedDoc.id);

          const success = await runTransaction(db, async (transaction) => {
            const sfDoc = await transaction.get(docRef);
            if (sfDoc.exists() && sfDoc.data().status === "waiting") {
              transaction.update(docRef, { 
                status: "matched",
                guestPeerId: myPeerId,
                guestUid: currentUserProfile.uid
              });
              return sfDoc.data();
            }
            return null;
          });

          if (success) {
            isHost = false;
            opponentNameTag.innerText = await resolveUsername(success.hostUid);
            const conn = peer.connect(success.hostPeerId);
            setupDataChannel(conn);
            inQueueProcess = false;
            return;
          }
        }

        isHost = true;
        const newRoom = await addDoc(collection(db, "showdown_queue"), {
          status: "waiting",
          hostPeerId: myPeerId,
          hostUid: currentUserProfile.uid,
          guestPeerId: "",
          guestUid: "",
          createdAt: Date.now()
        });
        activeQueueDocRef = newRoom;

        queueListenerUnsubscribe = onSnapshot(doc(db, "showdown_queue", newRoom.id), async (snapshot) => {
          const data = snapshot.data();
          if (data && data.status === "matched") {
            opponentNameTag.innerText = await resolveUsername(data.guestUid);
            deleteDoc(doc(db, "showdown_queue", newRoom.id));
            if (queueListenerUnsubscribe) {
              queueListenerUnsubscribe();
              queueListenerUnsubscribe = null;
            }
          }
        });

      } catch (err) {
        console.error("Matchmaking Failure: ", err);
        cancelSearch();
      }
      inQueueProcess = false;
    }

    async function cancelSearch() {
      if (queueListenerUnsubscribe) {
        queueListenerUnsubscribe();
        queueListenerUnsubscribe = null;
      }
      if (isHost && activeQueueDocRef) {
        try { 
          await deleteDoc(activeQueueDocRef); 
          activeQueueDocRef = null;
        } catch(e){}
      }
      btnStart.disabled = false;
      btnNext.disabled = false;
      switchStage(stageLobby);
    }

    // Set Up WebRTC Communication Channels
    function setupDataChannel(conn) {
      currentConnection = conn;

      currentConnection.on('open', () => {
        if (queueListenerUnsubscribe) {
          queueListenerUnsubscribe();
          queueListenerUnsubscribe = null;
        }
        btnStart.disabled = false;
        btnNext.disabled = false;

        if (!isHost && myMediaStream) {
          const mediaCall = peer.call(conn.peer, myMediaStream);
          mediaCall.on('stream', (remoteStream) => {
            opponentVideo.srcObject = remoteStream;
          });
        }

        runShowdownEngine();
      });

      currentConnection.on('data', (data) => {
        if (data.type === 'sync_score') {
          currentScore = data.score;
          renderUIFrames();
        }
      });

      currentConnection.on('close', () => {
        clearLoops();
        opponentVideo.srcObject = null; 
        lobbyMsg.style.color = "var(--text-muted)";
        lobbyMsg.innerText = "Opponent left the match.";
        switchStage(stageLobby);
      });
    }

    // Main Engine Logic Execution Loop
    function runShowdownEngine() {
      switchStage(stageMatch);
      
      countdownText.style.display = 'block';
      resultText.style.display = 'none';
      btnNext.style.display = 'none';
      btnExit.style.display = 'none';
      currentScore = 50;
      scaleNeedle.style.left = '50%';
      userSlot.classList.remove('winning');
      opponentSlot.classList.remove('winning');

      let timeLeft = 15;
      countdownText.innerText = timeLeft + "s";

      timerInterval = setInterval(() => {
        timeLeft--;
        countdownText.innerText = timeLeft + "s";
        if (timeLeft <= 0) {
          terminateShowdown();
        }
      }, 1000);

      matchInterval = setInterval(() => {
        if (isHost) {
          currentScore = AuraEngine.calculateMatchFlux(currentScore);
          if (currentConnection && currentConnection.open) {
            currentConnection.send({ type: 'sync_score', score: currentScore });
          }
          renderUIFrames();
        }
      }, 350);
    }

    function renderUIFrames() {
      let calculatedUserPosition = isHost ? currentScore : (100 - currentScore);
      scaleNeedle.style.left = calculatedUserPosition + '%';

      let userAura = Math.round((100 - calculatedUserPosition) * 10);
      let oppAura = Math.round(calculatedUserPosition * 10);
      userAuraText.innerText = `Aura: +${userAura}`;
      oppAuraText.innerText = `Aura: +${oppAura}`;

      if (calculatedUserPosition < 48) {
        userSlot.classList.add('winning');
        opponentSlot.classList.remove('winning');
      } else if (calculatedUserPosition > 52) {
        opponentSlot.classList.add('winning');
        userSlot.classList.remove('winning');
      } else {
        userSlot.classList.remove('winning');
        opponentSlot.classList.remove('winning');
      }
    }

    // Overhauled Terminal System with Sub-Category Metrics
    function terminateShowdown() {
      clearLoops();

      countdownText.style.display = 'none';
      resultText.style.display = 'block';
      btnNext.style.display = 'inline-block';
      btnExit.style.display = 'inline-block';

      let finalPosition = isHost ? currentScore : (100 - currentScore);
      let targetPhrases = [];
      let calculatedColor = "var(--text-muted)";

      // Tier Bracket Evaluation System 
      if (finalPosition < 20) {
        targetPhrases = OUTCOME_PHRASES.wonByATon;
        calculatedColor = "var(--accent)";
        userSlot.classList.add('winning');
        opponentSlot.classList.remove('winning');
      } else if (finalPosition >= 20 && finalPosition < 40) {
        targetPhrases = OUTCOME_PHRASES.won;
        calculatedColor = "var(--accent)";
        userSlot.classList.add('winning');
        opponentSlot.classList.remove('winning');
      } else if (finalPosition >= 40 && finalPosition < 48) {
        targetPhrases = OUTCOME_PHRASES.barelyWon;
        calculatedColor = "var(--accent)";
        userSlot.classList.add('winning');
        opponentSlot.classList.remove('winning');
      } else if (finalPosition >= 48 && finalPosition <= 52) {
        targetPhrases = OUTCOME_PHRASES.tie;
        calculatedColor = "var(--text-muted)";
        userSlot.classList.remove('winning');
        opponentSlot.classList.remove('winning');
      } else if (finalPosition > 52 && finalPosition <= 60) {
        targetPhrases = OUTCOME_PHRASES.barelyLost;
        calculatedColor = "#ef4444";
        opponentSlot.classList.add('winning');
        userSlot.classList.remove('winning');
      } else if (finalPosition > 60 && finalPosition <= 80) {
        targetPhrases = OUTCOME_PHRASES.lost;
        calculatedColor = "#ef4444";
        opponentSlot.classList.add('winning');
        userSlot.classList.remove('winning');
      } else {
        targetPhrases = OUTCOME_PHRASES.lostByATon;
        calculatedColor = "#ef4444";
        opponentSlot.classList.add('winning');
        userSlot.classList.remove('winning');
      }

      const rolledIndex = Math.floor(Math.random() * targetPhrases.length);
      resultText.innerText = targetPhrases[rolledIndex];
      resultText.style.color = calculatedColor;
    }

    function clearLoops() {
      clearInterval(timerInterval);
      clearInterval(matchInterval);
    }

    function cleanExit() {
      if (currentConnection) currentConnection.close();
      opponentVideo.srcObject = null;
      clearLoops();
      switchStage(stageLobby);
    }

    // ── AUTOMATIC CLEANUP ON TAB CLOSE / LEAVE ─────────────────
    async function handleUnexpectedDisconnect() {
      if (isHost && activeQueueDocRef) {
        try {
          // Instantly wipe the document if they leave while in the queue stage
          await deleteDoc(activeQueueDocRef);
          activeQueueDocRef = null;
        } catch (e) {
          console.error("Failed to clean up queue room on tab leave:", e);
        }
      }
    }

    // Cleans up database if tab is closed or navigated away from
    window.addEventListener("beforeunload", handleUnexpectedDisconnect);

    // Cleans up database if they switch to a different tab or minimize the window
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        handleUnexpectedDisconnect();
      }
    });
    // ─────────────────────────────────────────────────────────────

    btnStart.addEventListener('click', startMatchmaking);
    btnCancel.addEventListener('click', cancelSearch);
    btnNext.addEventListener('click', startMatchmaking);
    btnExit.addEventListener('click', cleanExit);
  </script>
</body>
</html>
