<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700;800&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  <style>
    .hero {
      text-align: center;
      padding: 6rem 2rem 4rem;
      background: radial-gradient(circle at top center, rgba(108,99,255,0.08) 0%, transparent 65%);
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: textGlow 3s ease-in-out infinite;
    }
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(108, 99, 255, 0.2); }
      50% { text-shadow: 0 0 40px rgba(108, 99, 255, 0.4); }
    }
    .hero h1 span {
      background: linear-gradient(135deg, #a5b4fc 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .hero p {
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 2rem;
      font-size: 1.1rem;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      width: 100%;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-l);
      padding: 2.5rem 2rem;
      transition: all 0.35s var(--ease);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.35s var(--ease);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(108, 99, 255, 0.5);
      background: var(--card-hover);
      box-shadow: 0 24px 48px rgba(108, 99, 255, 0.2), 0 0 40px rgba(108, 99, 255, 0.1);
    }
    .card:hover::before {
      opacity: 1;
    }
    .card h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    .card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      text-align: center;
    }
    .card .btn-primary { margin-top: auto; justify-content: center; align-self: center; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="#" class="active">Home</a></li>
          <li><a href="games/">Games</a></li>
          <li><a href="proxy/">Proxy</a></li>
          <li><a href="omoggle/">Omoggle</a></li>
          <li><a href="chat/">Chat</a></li>
          <li><a href="settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero">
    <a href="" class="logobig">CarsonGames</a>
    <p>New website, new games!</p>
    <a id="hero-signin-btn" href="login/" class="btn-primary">Sign In</a>
  </section>

  <main class="grid">
    <div class="card">
      <h3>Games</h3>
      <p> </p>
      <a href="games/" class="btn-primary">Open Games</a>
    </div>

    <div class="card">
      <h3>Omoggle</h3>
      <p> </p>
      <a href="omoggle/" class="btn-primary">Open Omoggle</a>
    </div>

    <div class="card">
      <h3>Carson Chat</h3>
      <p> </p>
      <a href="chat/" class="btn-primary">Open Chat</a>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
      authDomain: "carson-games.firebaseapp.com",
      projectId: "carson-games",
      storageBucket: "carson-games.firebasestorage.app",
      messagingSenderId: "856520252558",
      appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      const container = document.getElementById('auth-button-container');
      const heroSignInBtn = document.getElementById('hero-signin-btn');

      if (user) {
        container.innerHTML = '<a id="logout-btn" href="#" class="nav-auth-btn">Logout</a>';
        
        // Hide the middle Sign In button when logged in
        if (heroSignInBtn) {
          heroSignInBtn.style.display = 'none';
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            await signOut(auth);
            window.location.reload();
          } catch (err) {
            console.error('Logout error:', err);
          }
        });
      } else {
        container.innerHTML = '<a href="login/" class="nav-auth-btn">Sign In</a>';
        
        // Show the middle Sign In button when logged out
        if (heroSignInBtn) {
          heroSignInBtn.style.display = '';
        }
      }
    });
  </script>

</body>
</html>
