<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Games</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    .container { max-width: 1300px; margin: 0 auto; padding: 3rem 2rem; width: 100%; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
    .header-bar h2 { font-family: var(--font-display); font-size: 2rem; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    .game-card { display: block; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-l); overflow: hidden; transition: all 0.25s var(--ease); cursor: pointer; position: relative; color: inherit; text-decoration: none; }
    .game-card:focus { outline: 3px solid rgba(108,99,255,0.12); }
    .game-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
    .game-thumb { width: 100%; aspect-ratio: 4/3; background: #181b33; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
    .game-info { padding: 1.2rem; }
    .game-info h4 { font-size: 1rem; margin-bottom: 0.4rem; font-family: var(--font-display); }
    .game-info span { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="#" class="active">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="../chat/">Chat</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="header-bar">
      <h2>Games</h2>
      <input id="game-search" type="text" class="input-field" placeholder="Search games..." aria-label="Search games">
    </div>

    <div id="no-results" class="no-results" aria-live="polite" hidden>No games match your search.</div>

    <div class="game-grid">
      <a class="game-card" href="../play/minecraft/" aria-label="Open Minecraft: Java Edition">
        <div class="game-thumb">Thumbnail Array [0]</div>
        <div class="game-info">
          <h4>Minecraft: Java Edition</h4>
        </div>
      </a>

      <a class="game-card" href="../play/roblox/" aria-label="Open Roblox Client">
        <div class="game-thumb">Thumbnail Array [1]</div>
        <div class="game-info">
          <h4>Roblox Client</h4>
        </div>
      </a>

      <a class="game-card" href="../play/retro-strike/" aria-label="Open Retro Strike Alpha">
        <div class="game-thumb">Thumbnail Array [2]</div>
        <div class="game-info">
          <h4>Retro Strike Alpha</h4>
        </div>
      </a>

      <a class="game-card" href="../play/fortnite-retro/" aria-label="Open Fortnite Retro">
        <div class="game-thumb">Thumbnail Array [3]</div>
        <div class="game-info">
          <h4>Fortnite Retro</h4>
        </div>
      </a>
    </div>
  </main>
</main>

  <style>
    .no-results { text-align: center; color: var(--text-muted); padding: 1rem 2rem; font-style: italic; }
  </style>

  <script>
    (function(){
      const input = document.getElementById('game-search');
      if(!input) return;
      const cards = Array.from(document.querySelectorAll('.game-card'));
      const noResults = document.getElementById('no-results');

      function filter(q){
        const query = (q||'').trim().toLowerCase();
        let any = false;
        cards.forEach(card => {
          const titleEl = card.querySelector('.game-info h4');
          const title = titleEl ? titleEl.textContent.trim().toLowerCase() : '';
          const match = !query || title.indexOf(query) !== -1;
          card.style.display = match ? '' : 'none';
          if(match) any = true;
        });
        if(noResults) noResults.hidden = any;
      }

      input.addEventListener('input', function(e){ filter(e.target.value); });
      input.addEventListener('keydown', function(e){ if(e.key === 'Escape'){ this.value=''; filter(''); } });

      // init count in header
      const headerCount = document.querySelector('.header-bar h2');
      if(headerCount) headerCount.textContent = `Games (${cards.length})`;
    })();
  </script>

</body>
</html>
