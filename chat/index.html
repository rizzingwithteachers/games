<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carson Games - Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── THEME CONFIGURATION ──────────────────────────────── */
    :root {
      --bg: #06060c;
      --surface: #0c0d19;
      --card: #121426;
      --card-hover: #181b33;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(124, 58, 237, 0.4);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --accent-blue: #3b82f6;
      --radius-m: 8px;
      --radius-l: 14px;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-display: 'Outfit', system-ui, sans-serif;
      --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ── BASE RESET ───────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      height: 100dvh; 
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    header {
      background: rgba(12, 13, 25, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 999;
      flex-shrink: 0; 
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: var(--radius-m);
      transition: all 0.3s var(--ease);
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s var(--ease);
    }

    nav a:hover, nav a.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    nav a:hover::after {
      width: 100%;
    }

    .nav-auth-btn {
      background: var(--accent);
      color: #fff !important;
      padding: 8px 18px !important;
      border-radius: 999px !important;
      font-weight: 600 !important;
      font-size: 0.85rem !important;
      text-decoration: none !important;
      display: inline-block;
      transition: all 0.3s var(--ease);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
      position: relative;
      overflow: hidden;
    }

    .nav-auth-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .nav-auth-btn:hover {
      transform: translateY(-2px) scale(1.08);
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.5);
      background: rgba(108, 99, 255, 0.95) !important;
    }

    .nav-auth-btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border: none;
      border-radius: var(--radius-m);
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: all 0.3s var(--ease);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.5);
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    /* ── LAYOUT MECHANICS ─────────────────────────────────── */
    .chat-layout { 
      display: flex; 
      justify-content: center; 
      align-items: stretch; 
      height: calc(100dvh - 72px); 
      width: 100vw; 
      overflow: hidden; 
      background: var(--bg); 
    }

    .chat-main { 
      width: 100%; 
      max-width: 1100px; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column; 
      background: #090a14; 
      overflow: hidden; 
      position: relative; 
    }

    .chat-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      gap: 12px; 
      padding: 0.95rem 1.5rem; 
      border-bottom: 1px solid var(--border); 
      flex-shrink: 0;
    }

    .chat-meta { display: flex; align-items: center; gap: 0.75rem; }
    .channel-title { font-family: var(--font-display); font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }

    .message-scroller { 
      flex: 1; 
      padding: 1.4rem 1.5rem; 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch; 
    }

    .msg-block { display: flex; gap: 1rem; align-items: flex-start; transition: opacity 0.2s ease; position: relative; }
    .msg-block.pending { opacity: 0.4; filter: brightness(0.8); }

    .msg-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--card); flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: var(--font-display); font-weight: 800; }
    .msg-content { width: 100%; padding-right: 80px; }
    .msg-top { display: flex; align-items: center; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.35rem; }
    .msg-content h5 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; margin: 0; color: var(--text); }
    .msg-content h5 span { font-size: 0.75rem; color: var(--text-muted); margin-left: 8px; font-weight: 500; }
    .msg-content p { color: #cbd5e1; font-size: 0.95rem; line-height: 1.7; margin: 0; }

    .msg-controls-tray { position: absolute; right: 10px; top: 12px; display: flex; gap: 8px; align-items: center; }
    
    .action-control-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
    .action-control-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .action-control-btn.btn-delete-msg:hover { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.4); }

    .tray-icon-img { width: 14px; height: 14px; object-fit: contain; pointer-events: none; opacity: 0.8; transition: opacity 0.2s var(--ease); }
    .action-control-btn:hover .tray-icon-img { opacity: 1; }

    .badge-admin { color: #3b82f6; font-size: 0.72rem; background: rgba(59,130,246,0.12); padding: 2px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(59,130,246,0.2); text-transform: uppercase; margin-left: 4px; }
    .badge-owner { color: #f59e0b; font-size: 0.72rem; background: rgba(245,158,11,0.12); padding: 2px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(245,158,11,0.2); text-transform: uppercase; margin-left: 4px; }

    .duel-card { background: #111224; border: 1px solid rgba(108, 99, 255, 0.2); border-radius: var(--radius-m); padding: 1rem; margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.75rem; max-width: 440px; }
    .duel-card-msg { font-size: 0.9rem; color: #cbd5e1; font-weight: 500; }
    .duel-card-actions { display: flex; gap: 8px; }
    
    .btn-duel-accept { background: #10b981; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: background 0.2s ease; }
    .btn-duel-accept:hover { background: #059669; }
    .btn-duel-decline { background: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: background 0.2s ease; }
    .btn-duel-decline:hover { background: #dc2626; }

    .input-container { 
      padding: 0 1.5rem 1.5rem; 
      position: relative; 
      flex-shrink: 0; 
    }
    .input-row { display: flex; gap: 0.75rem; align-items: center; }
    
    .input-container .input-field { 
      width: 100%; 
      background: var(--surface); 
      padding: 12px 16px; 
      border-radius: var(--radius-m); 
      border: 1px solid var(--border); 
      color: var(--text); 
      outline: none;
      font-size: 0.9rem;
      transition: all 0.3s var(--ease);
      touch-action: manipulation; 
    }
    
    .input-container .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px rgba(108, 99, 255, 0.2);
    }

    .send-btn { min-width: 130px; }

    .cooldown-text {
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      padding-left: 1rem;
      visibility: hidden;
      height: 1.2rem;
      animation: fadeIn 0.2s ease;
    }

    .send-btn:disabled {
      opacity: 0.4 !important;
      filter: brightness(0.5) !important;
      pointer-events: none !important;
      cursor: not-allowed !important;
      box-shadow: none !important;
      transform: none !important;
      transition: none !important;
    }

    .suggestions-popover {
      position: absolute;
      bottom: calc(100% - 4px);
      left: 1.5rem;
      right: 1.5rem;
      background: #111224;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      padding: 6px 0;
      -webkit-overflow-scrolling: touch;
    }
    
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px; 
      color: #cbd5e1;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s ease;
    }
    .suggestion-item:hover, .suggestion-item.selected {
      background: #232442;
      color: #fff;
    }
    .suggestion-item .item-icon { font-weight: bold; color: #a855f7; }
    .suggestion-item .item-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #fff; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: none; } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    header { animation: slideInLeft 600ms var(--ease) both; }
    .chat-layout { animation: fadeUp 480ms var(--ease) both; }
    .chat-main { animation: slideInRight 500ms var(--ease) both; }

    @media (prefers-reduced-motion: reduce) {
      header, .chat-layout, .chat-main, .cooldown-text { animation: none !important; }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="#" class="active">Chat</a></li>
          <li><a href="../settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="chat-layout">
    <section class="chat-main">
      <div class="chat-header">
        <div class="chat-meta">
          <div class="channel-title"><span></span><strong>Carson Chat</strong></div>
        </div>
      </div>
      
      <div class="message-scroller" id="message-scroller"></div>

      <div class="input-container">
        <div id="suggestions-popover" class="suggestions-popover"></div>
        <div id="cooldown-timer-text" class="cooldown-text"></div>
        
        <div class="input-row">
          <input id="message-input" type="text" class="input-field" placeholder="Type a message or / for a command..." autocomplete="off">
          <button id="send-message-btn" class="btn-primary send-btn">Send</button>
        </div>
      </div>
    </section>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  updateDoc,
  deleteDoc,
  query,
  orderBy,
  limit,
  startAfter,
  getDocs,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc,
  where
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
  authDomain: "carson-games.firebaseapp.com",
  projectId: "carson-games",
  storageBucket: "carson-games.firebasestorage.app",
  messagingSenderId: "856520252558",
  appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ALPHABETICALLY ORGANIZED COMMAND LIST ENGINE */
const EX_COMMANDS = [
  { name: "/admin", desc: "Changes user permissions to allow for more control" },
  { name: "/ban", desc: "Bans a user from using or seeing chat for a chosen amount oftime" },
  { name: "/deleteall", desc: "Deletes all chat messages and whispers" },
  { name: "/deleteuser", desc: "Removes user from database entirely" },
  { name: "/headadmin", desc: "Changes user permissions to allow for full control" },
  { name: "/mute", desc: "Mute a specific user for a chosen amount of time" },
  { name: "/omoggle", desc: "Invite a user to an Omoggle duel" },
  { name: "/permaban", desc: "Permanently bans a user from chat until unbanned" },
  { name: "/subscription", desc: "Assigns rank (basic or premium) to user" },
  { name: "/unadmin", desc: "Removes admin permissions from a user" },
  { name: "/unban", desc: "Unbans a user from the chat" },
  { name: "/unheadadmin", desc: "Removes headadmin status from a user" },
  { name: "/unmute", desc: "Unmutes a user from the chat" },
  { name: "/undo", desc: "Undos your last edit or delete" },
  { name: "/users", desc: "Shows a list of all current users" },
  { name: "/w", desc: "Whisper privately to other users" }
].sort((a, b) => a.name.localeCompare(b.name));

let currentUser = null;
let currentUsername = "User"; 
let currentUserRole = "user"; 
let currentUserMutedUntil = 0; 
let currentUserBannedUntil = 0;

let lastMessageTime = 0;
const MESSAGE_COOLDOWN = 2000; 
let lastLoadedTimestamp = null;
let isLoadingMore = false;
let initialSnapshotReceived = false; 
let isFirstLoad = true; 

let dbPublicMessages = [];
let dbPrivateMessages = [];
let dbHistoricalMessages = []; 
let localPendingQueue = [];

let allRegisteredUsers = []; 
let localUsersCache = [];      

let activeSuggestionIndex = 0;
let currentMentionTriggerIdx = -1; 
let currentMentionType = ""; 

let isEditingMode = false;
let editingMessageId = null;
let editingCollectionTarget = "messages";
let allMessagesLoaded = false; 

/* UNDO LOG PARAMETER STACK STORAGE */
let lastActionLog = null; 

/* 2-SECOND CONNECTION FAILSAFE TIMEOUT */
setTimeout(() => {
  if (auth.currentUser && !initialSnapshotReceived) {
    console.warn("Failsafe triggered: Chat channel frozen. Forcing reload...");
    window.location.reload();
  }
}, 2000);

/* AUTH CHECK & SYNC USER ROLES / MUTE STATE */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.replace("../login/");
    return;
  }

  currentUser = user;
  currentUsername = user.email ? user.email.split("@")[0] : "User";

  const userRef = doc(db, "users", user.uid);

  onSnapshot(userRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      currentUsername = data.username || user.email.split("@")[0];
      currentUserRole = data.role || "user";
      currentUserMutedUntil = data.mutedUntil || 0;
      currentUserBannedUntil = data.bannedUntil || 0;
      
      if (currentUserBannedUntil && Date.now() < currentUserBannedUntil) {
        handleBannedUserDisplay();
      }
    } else {
      setDoc(userRef, {
        username: user.email.split("@")[0],
        email: user.email,
        role: "user",
        rank: "none",
        createdAt: Date.now()
      }, { merge: true });
      currentUsername = user.email.split("@")[0];
      currentUserRole = "user";
    }
  });

  await startChat(user);
  addLogout();
});

function handleBannedUserDisplay() {
  const scroller = document.getElementById("message-scroller");
  const inputRow = document.querySelector(".input-row");
  if(inputRow) inputRow.style.display = "none";
  if(scroller) {
    scroller.innerHTML = `<div style="text-align: center; color: #ef4444; font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; padding: 3rem 1rem;">You have been banned from this chat channel.</div>`;
  }
}

/* MASTER USER REGISTRY RE-ENGINEERED FOR EXTENDED FIELDS */
async function loadAndCacheAllUsers() {
  try {
    const snap = await getDocs(collection(db, "users"));
    const fetchedUsers = snap.docs.map(doc => {
      const data = doc.data();
      return {
        id: doc.id,
        username: data.username || "User",
        email: data.email || "N/A",
        role: data.role || "user",
        rank: data.rank || "none",
        createdAt: data.createdAt || 0,
        avatar: data.username ? data.username[0].toUpperCase() : "U"
      };
    });

    allRegisteredUsers = fetchedUsers;
    localUsersCache = fetchedUsers;
  } catch (err) {
    console.error("Failed to compile master user profile storage parameters:", err);
  }
}

/* LOCAL SYSTEM CHAT NOTIFIER NOTIFICATION MATRICES */
function showLocalSystemMessage(text, isError = false) {
  const scroller = document.getElementById("message-scroller");
  const isPinnedToBottom = scroller.scrollHeight - scroller.clientHeight <= scroller.scrollTop + 30;
  
  const div = document.createElement("div");
  div.className = "msg-block";
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const textColor = isError ? "#ef4444" : "#6c63ff";

  div.innerHTML = `
    <div class="msg-avatar" style="background: #242549; color: #fff;">S</div>
    <div class="msg-content">
      <div class="msg-top">
        <h5>Server <span>${time}</span></h5>
      </div>
      <p style="color: ${textColor}; font-weight: 600;">${text}</p>
    </div>
  `;

  scroller.appendChild(div);
  
  if (isPinnedToBottom || initialSnapshotReceived) {
    scroller.scrollTop = scroller.scrollHeight;
  }
}

/* MUTE & COOLDOWN TIMER LAYOUT MANAGER COMBINED */
function startCooldownTimer(forcedMuteTime = null) {
  const btn = document.getElementById("send-message-btn");
  const textContainer = document.getElementById("cooldown-timer-text");

  btn.disabled = true;
  textContainer.style.visibility = "visible";

  const updateDisplay = () => {
    let remaining = 0;
    if (forcedMuteTime) {
      remaining = forcedMuteTime - Date.now();
    } else {
      const elapsed = Date.now() - lastMessageTime;
      remaining = MESSAGE_COOLDOWN - elapsed;
    }

    if (remaining <= 0) {
      clearInterval(countdownInterval);
      btn.disabled = false;
      textContainer.style.visibility = "hidden";
      textContainer.textContent = "";
    } else {
      if (forcedMuteTime) {
        const totalSecs = Math.ceil(remaining / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        const timeStr = mins > 0 ? `${mins} minute(s) ${secs} second(s)` : `${secs} second(s)`;
        textContainer.textContent = `You are muted for ${timeStr}`;
      } else {
        const secondsLeft = Math.ceil(remaining / 1000);
        textContainer.textContent = `You must wait ${secondsLeft} more second${secondsLeft > 1 ? 's' : ''} to send a message`;
      }
    }
  };

  updateDisplay();
  const countdownInterval = setInterval(updateDisplay, 100);
}

/* CHAT SETUP */
async function startChat(user) {
  const input = document.getElementById("message-input");
  const btn = document.getElementById("send-message-btn");
  const scroller = document.getElementById("message-scroller");

  await loadAndCacheAllUsers();

  listenForNewMessages(user);
  scroller.addEventListener("scroll", handleScrollPagination);
  setupAutocompleteEngine(input);

  btn.onclick = async () => {
    let textToSend = input.value.trim();
    if (!textToSend) return;

    /* BLOCKS MUTED PARTICIPANTS WITH COOLDOWN BANNER INTERFACE */
    if (currentUserMutedUntil && Date.now() < currentUserMutedUntil) {
      startCooldownTimer(currentUserMutedUntil);
      return;
    }
    
    if (isEditingMode) {
      try {
        const docRef = doc(db, editingCollectionTarget, editingMessageId);
        const previousSnapshot = await getDoc(docRef);
        if (previousSnapshot.exists()) {
          lastActionLog = { type: "edit", collection: editingCollectionTarget, id: editingMessageId, data: previousSnapshot.data() };
        }
        await updateDoc(docRef, { text: textToSend });
      } catch (err) {
        console.error("Error writing message update modification:", err);
      }
      isEditingMode = false;
      editingMessageId = null;
      btn.textContent = "Send";
      input.value = "";
      return; 
    }

    const now = Date.now();
    if (now - lastMessageTime < MESSAGE_COOLDOWN) return; 

    input.value = "";
    lastMessageTime = now;
    
    startCooldownTimer();
    closePopover();

    if (textToSend.startsWith("/")) {
      const segments = textToSend.split(/\s+/);
      const commandKey = segments[0].toLowerCase();
      const parsedTargetName = segments[1]?.replace("@", "");
      const targetUser = localUsersCache.find(u => u.username.toLowerCase() === parsedTargetName?.toLowerCase());

      const isAdminPlus = currentUserRole === "admin" || currentUserRole === "owner";
      const isOwnerOnly = currentUserRole === "owner";

      // 1. /mute
      if (commandKey === "/mute" && isAdminPlus) {
        const minutesValue = parseInt(segments[2]);
        if (!targetUser || isNaN(minutesValue)) { showLocalSystemMessage("Syntax: /mute @username minutes", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { mutedUntil: Date.now() + (minutesValue * 60 * 1000) });
        showLocalSystemMessage(`Muted user @${targetUser.username} for ${minutesValue} minutes.`, false);
        return;
      }

      // 2. /unmute
      if (commandKey === "/unmute" && isAdminPlus) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /unmute @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { mutedUntil: 0 });
        showLocalSystemMessage(`Unmuted user @${targetUser.username}.`, false);
        return;
      }

      // 3. /admin
      if (commandKey === "/admin" && isOwnerOnly) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /admin @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { role: "admin" });
        showLocalSystemMessage(`Promoted @${targetUser.username} to Admin.`, false);
        return;
      }

      // 4. /unadmin
      if (commandKey === "/unadmin" && isOwnerOnly) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /unadmin @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { role: "user" });
        showLocalSystemMessage(`Demoted @${targetUser.username} to standard User level.`, false);
        return;
      }

      // 5. /headadmin
      if (commandKey === "/headadmin" && isOwnerOnly) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /headadmin @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { role: "owner" });
        showLocalSystemMessage(`Promoted @${targetUser.username} to Head Admin/Owner privileges.`, false);
        return;
      }

      // 6. /unheadadmin
      if (commandKey === "/unheadadmin" && isOwnerOnly) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /unheadadmin @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { role: "admin" });
        showLocalSystemMessage(`Stripped Head Admin access from @${targetUser.username}. Assigned Admin parameters.`, false);
        return;
      }

      // 7. /subscription
      if (commandKey === "/subscription" && isOwnerOnly) {
        const chosenRank = segments[2]?.toLowerCase();
        if (!targetUser || (chosenRank !== "basic" && chosenRank !== "premium")) { showLocalSystemMessage("Syntax: /subscription @username basic/premium", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { rank: chosenRank });
        showLocalSystemMessage(`Updated subscription framework parameter for @${targetUser.username} to [${chosenRank}].`, false);
        await loadAndCacheAllUsers();
        return;
      }

      // 8. /deleteuser
      if (commandKey === "/deleteuser" && isOwnerOnly) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /deleteuser @username", true); return; }
        await deleteDoc(doc(db, "users", targetUser.id));
        showLocalSystemMessage(`Purged user database authentication parameters for user identity: @${targetUser.username}.`, false);
        await loadAndCacheAllUsers();
        return;
      }

      // 9. /ban
      if (commandKey === "/ban" && isAdminPlus) {
        const hoursValue = parseInt(segments[2]);
        if (!targetUser || isNaN(hoursValue)) { showLocalSystemMessage("Syntax: /ban @username hours", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { bannedUntil: Date.now() + (hoursValue * 60 * 60 * 1000) });
        showLocalSystemMessage(`Banned @${targetUser.username} from entering board architecture for ${hoursValue} hours.`, false);
        return;
      }

      // 10. /unban
      if (commandKey === "/unban" && isAdminPlus) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /unban @username", true); return; }
        await updateDoc(doc(db, "users", targetUser.id), { bannedUntil: 0 });
        showLocalSystemMessage(`Lifted server entry ban parameters from user profile @${targetUser.username}.`, false);
        return;
      }

      // 11. /permaban
      if (commandKey === "/permaban" && isAdminPlus) {
        if (!targetUser) { showLocalSystemMessage("Syntax: /permaban @username", true); return; }
        // Sets expiration timestamp 100 years out
        await updateDoc(doc(db, "users", targetUser.id), { bannedUntil: Date.now() + (100 * 365 * 24 * 60 * 60 * 1000) });
        showLocalSystemMessage(`Permanently banned @${targetUser.username} from entering chat framework loops.`, false);
        return;
      }

      // 12. /deleteall
      if (commandKey === "/deleteall" && isAdminPlus) {
        const publicSnap = await getDocs(collection(db, "messages"));
        publicSnap.forEach(async (documentItem) => await deleteDoc(doc(db, "messages", documentItem.id)));
        const whispersSnap = await getDocs(collection(db, "whispers"));
        whispersSnap.forEach(async (documentItem) => await deleteDoc(doc(db, "whispers", documentItem.id)));
        showLocalSystemMessage("Database tables successfully optimized. Purged records completely.", false);
        return;
      }

      // 13. /users
      if (commandKey === "/users" && isAdminPlus) {
        await loadAndCacheAllUsers();
        let readoutStructureStr = "<span style='text-transform: uppercase; font-size: 0.8rem; color: #a855f7;'>Active User System Diagnostics Log Matrix:</span><br>";
        allRegisteredUsers.forEach(u => {
          const creationDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : "N/A";
          readoutStructureStr += `• ID: <strong>${u.username}</strong> | Core Contact: ${u.email} | Scope: ${u.role} | Tier: ${u.rank} | Log: ${creationDate}<br>`;
        });
        showLocalSystemMessage(readoutStructureStr, false);
        return;
      }

      /* 14. /undo CONFIGURATION CORE EXECUTOR */
      if (commandKey === "/undo") {
        if (!lastActionLog) { showLocalSystemMessage("No valid local environment modifications recorded on the action track stack.", true); return; }
        try {
          if (lastActionLog.type === "delete") {
            await setDoc(doc(db, lastActionLog.collection, lastActionLog.id), lastActionLog.data);
            showLocalSystemMessage("Undo Executed: Restored deleted document record.");
          } else if (lastActionLog.type === "edit") {
            await updateDoc(doc(db, lastActionLog.collection, lastActionLog.id), { text: lastActionLog.data.text });
            showLocalSystemMessage("Undo Executed: Reverted text modifications to previous step state.");
          }
          lastActionLog = null;
        } catch(err) {
          showLocalSystemMessage("Failed to apply document restoration step parameters.", true);
        }
        return;
      }
    }

    const isWhisperCommand = textToSend.startsWith("/w ");
    const isOmoggleCommand = textToSend.startsWith("/omoggle ");
    let targetUsernames = [];
    let parsedText = textToSend;

    if (isWhisperCommand || isOmoggleCommand) {
      const parts = textToSend.split(/\s+/);
      let i = 1;
      while (i < parts.length && parts[i].startsWith("@")) {
        targetUsernames.push(parts[i].substring(1).toLowerCase());
        i++;
      }
      if (targetUsernames.length > 0) {
        parsedText = parts.slice(i).join(" ");
      }
    }

    const clientSideId = "msg-" + Date.now() + Math.random().toString(36).substring(2);

    const pendingMsgData = {
      text: isOmoggleCommand && !parsedText ? "Do you want to duel in Omoggle?" : parsedText,
      username: currentUsername,
      userId: user.uid,
      avatar: currentUsername && currentUsername.length > 0 ? currentUsername[0].toUpperCase() : "U",
      timestamp: null,
      isPending: true,
      isWhisper: targetUsernames.length > 0,
      isOmoggleInvite: isOmoggleCommand,
      inviteStatus: isOmoggleCommand ? "pending" : null,
      role: currentUserRole,
      clientSideId: clientSideId
    };

    localPendingQueue.push(pendingMsgData);
    renderMessages(true); 

    try {
      if (targetUsernames.length > 0) {
        let participantIds = [user.uid];
        
        targetUsernames.forEach(uname => {
          const matchedUser = localUsersCache.find(u => u.username.toLowerCase() === uname);
          if (matchedUser && !participantIds.includes(matchedUser.id)) {
            participantIds.push(matchedUser.id);
          }
        });

        if (participantIds.length === 1) {
          throw new Error("No valid recipients found with those usernames in your local cache.");
        }

        const challengePayload = {
          text: isOmoggleCommand && !parsedText ? "Do you want to duel in Omoggle?" : parsedText,
          username: currentUsername,
          senderId: user.uid,
          avatar: currentUsername && currentUsername.length > 0 ? currentUsername[0].toUpperCase() : "U",
          timestamp: serverTimestamp(),
          participants: participantIds,
          role: currentUserRole,
          clientSideId: clientSideId
        };

        if (isOmoggleCommand) {
          challengePayload.isOmoggleInvite = true;
          challengePayload.inviteStatus = "pending";
        }

        await addDoc(collection(db, "whispers"), challengePayload);
      } else {
        await addDoc(collection(db, "messages"), {
          text: textToSend,
          username: currentUsername,
          userId: user.uid,
          avatar: currentUsername && currentUsername.length > 0 ? currentUsername[0].toUpperCase() : "U",
          timestamp: serverTimestamp(),
          role: currentUserRole,
          clientSideId: clientSideId
        });
      }
    } catch (err) {
      console.error("Error sending message:", err);
      showLocalSystemMessage(err.message || "Failed to deliver message.", true);
      localPendingQueue = localPendingQueue.filter(m => m.clientSideId !== clientSideId);
      renderMessages();
    }
  };
}

/* ZERO-READ DYNAMIC LOCAL CACHE ENGINE */
function updateAutocompleteCacheFromLoadedMessages() {
  const uniqueUsers = new Map();

  allRegisteredUsers.forEach(user => {
    uniqueUsers.set(user.id, user);
  });

  let allMessages = [...dbHistoricalMessages, ...dbPublicMessages, ...dbPrivateMessages];
  allMessages.forEach(msg => {
    if (msg.userId && msg.username) {
      uniqueUsers.set(msg.userId, {
        id: msg.userId,
        username: msg.username,
        avatar: msg.avatar || msg.username[0].toUpperCase()
      });
    } else if (msg.senderId && msg.username) {
      uniqueUsers.set(msg.senderId, {
        id: msg.senderId,
        username: msg.username,
        avatar: msg.avatar || msg.username[0].toUpperCase()
      });
    }
  });

  localUsersCache = Array.from(uniqueUsers.values());
}

/* REAL-TIME STREAM LISTENERS */
function listenForNewMessages(user) {
  const publicQ = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(20));
  onSnapshot(publicQ, (snapshot) => {
    initialSnapshotReceived = true; 
    dbPublicMessages = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id, isWhisper: false }));
    if (!lastLoadedTimestamp && snapshot.docs.length > 0) {
      lastLoadedTimestamp = snapshot.docs[snapshot.docs.length - 1].data().timestamp;
    }
    
    if (snapshot.docs.length < 20) {
      allMessagesLoaded = true;
    }
    renderMessages();
  });

  const privateQ = query(collection(db, "whispers"), where("participants", "array-contains", user.uid));
  onSnapshot(privateQ, (snapshot) => {
    dbPrivateMessages = snapshot.docs.map(doc => {
      const data = doc.data();
      
      if (data.isOmoggleInvite && data.inviteStatus === "accepted") {
        const sessionRedirectToken = `omoggle_redirected_${doc.id}`;
        
        if (!sessionStorage.getItem(sessionRedirectToken)) {
          sessionStorage.setItem(sessionRedirectToken, "true");
          
          const currentAuthenticatedUid = auth.currentUser ? auth.currentUser.uid : user.uid;
          const roleIdentityString = currentAuthenticatedUid === data.senderId ? "host" : "guest";
          
          setTimeout(() => {
            window.location.href = `../omoggle/?room=${doc.id}&role=${roleIdentityString}`;
          }, 800);
        }
      }
      return { ...data, id: doc.id, isWhisper: true };
    });
    renderMessages();
  });
}

function renderMessages(forceScrollDown = false) {
  if (currentUserBannedUntil && Date.now() < currentUserBannedUntil) {
    handleBannedUserDisplay();
    return;
  }

  const scroller = document.getElementById("message-scroller");
  
  const isPinnedToBottom = scroller.scrollHeight - scroller.clientHeight <= scroller.scrollTop + 30;
  const cachedScrollTop = scroller.scrollTop;

  updateAutocompleteCacheFromLoadedMessages();

  scroller.innerHTML = "";

  if (allMessagesLoaded) {
    const banner = document.createElement("div");
    banner.style.cssText = "text-align: center; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; padding: 10px 0; width: 100%; margin-bottom: 0.5rem;";
    banner.textContent = "All messages loaded";
    scroller.appendChild(banner);
  }

  let allMessages = [...dbHistoricalMessages, ...dbPublicMessages, ...dbPrivateMessages];
  
  const seenIds = new Set();
  allMessages = allMessages.filter(msg => {
    const msgId = msg.id || msg.clientSideId;
    if (!msgId) return true;
    if (seenIds.has(msgId)) return false;
    seenIds.add(msgId);
    return true;
  });

  allMessages.sort((a, b) => {
    const timeA = a.timestamp ? a.timestamp.toMillis() : Date.now();
    const timeB = b.timestamp ? b.timestamp.toMillis() : Date.now();
    return timeA - timeB;
  });

  const confirmedDbClientIds = new Set(allMessages.map(m => m.clientSideId).filter(Boolean));
  localPendingQueue = localPendingQueue.filter(m => !confirmedDbClientIds.has(m.clientSideId));

  allMessages.forEach(msg => displayMessage(scroller, msg));
  localPendingQueue.forEach(pendingMsg => displayMessage(scroller, pendingMsg));
  
  if (isFirstLoad && dbPublicMessages.length > 0) {
    scroller.scrollTop = scroller.scrollHeight;
    isFirstLoad = false;
  } else if (isPinnedToBottom || forceScrollDown) {
    scroller.scrollTop = scroller.scrollHeight;
  } else {
    scroller.scrollTop = cachedScrollTop;
  }
}

function displayMessage(scroller, msgData) {
  const div = document.createElement("div");
  div.className = "msg-block" + (msgData.isPending ? " pending" : "");
  if(msgData.clientSideId) div.id = msgData.clientSideId;
  
  const time = msgData.timestamp ? new Date(msgData.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Sending...";
  
  let statusBadgeHTML = "";
  if (msgData.role === "admin") statusBadgeHTML = `<span class="badge-admin">Admin</span>`;
  if (msgData.role === "owner") statusBadgeHTML = `<span class="badge-owner">Owner</span>`;
  
  const whisperTag = msgData.isWhisper ? `<span style="color: #a855f7; font-size: 0.75rem; margin-left: 8px; background: rgba(168,85,247,0.12); padding: 2px 7px; border-radius: 99px; font-weight: 600; border: 1px solid rgba(168,85,247,0.2);">Whisper</span>` : "";

  const safeUsername = msgData.username || "User";
  const avatarLetter = safeUsername.length > 0 ? safeUsername[0].toUpperCase() : "U";

  let textContent = escapeHtml(msgData.text || "");
  textContent = textContent.replace(/@([a-zA-Z0-9_\-]+)/g, '<span style="color: #3b82f6; background: rgba(59,130,246,0.15); padding: 1px 5px; border-radius: 4px; font-weight: 600; border: 1px solid rgba(59,130,246,0.2);">@$1</span>');

  let layoutStructuralString = "";

  if (msgData.isOmoggleInvite) {
    let internalDuelPanelHTML = "";
    let inviteContextLineText = "";
    const userIsChallengeSender = currentUser && currentUser.uid === msgData.senderId;

    if (msgData.inviteStatus === "pending") {
      if (!userIsChallengeSender) {
        inviteContextLineText = `<p style="color:#6c63ff; font-weight:600;">@${safeUsername} sent you a duel request on Omoggle!</p>`;
        internalDuelPanelHTML = `
          <div class="duel-card">
            <span class="duel-card-msg">Do you want to duel in Omoggle?</span>
            <div class="duel-card-actions">
              <button class="btn-duel-accept">Accept</button>
              <button class="btn-duel-decline">Decline</button>
            </div>
          </div>
        `;
      } else {
        inviteContextLineText = `<p style="color:#6c63ff; font-weight:600;">Sent Omoggle duel request to your opponent (Pending...)</p>`;
        internalDuelPanelHTML = ""; 
      }
    } else if (msgData.inviteStatus === "accepted") {
      inviteContextLineText = `<p style="color:#10b981; font-weight:600;">Omoggle duel match accepted!</p>`;
      internalDuelPanelHTML = `<div class="duel-card" style="border-color:#10b981;"><span class="duel-card-msg" style="color:#10b981;">Duel accepted! Redirecting...</span></div>`;
    } else {
      inviteContextLineText = `<p style="color:#ef4444; font-weight:600;">Omoggle challenge update</p>`;
      internalDuelPanelHTML = `<div class="duel-card" style="border-color:#ef4444;"><span class="duel-card-msg" style="color:#ef4444;">Challenge declined.</span></div>`;
    }

    layoutStructuralString = `
      <div class="msg-avatar" style="background: #242549; color: #fff;">S</div>
      <div class="msg-content">
        <div class="msg-top">
          <h5>Server <span>${time}</span></h5>
        </div>
        ${inviteContextLineText}
        ${internalDuelPanelHTML}
      </div>
    `;
  } else {
    let staticControlsTrayHTML = "";
    if (currentUser && (currentUser.uid === msgData.userId || currentUser.uid === msgData.senderId || currentUserRole === "admin" || currentUserRole === "owner")) {
      staticControlsTrayHTML = `
        <div class="msg-controls-tray">
          <button class="action-control-btn btn-edit-msg" title="Modify Context">
            <img src="../assets/chat-pencil.svg" alt="Edit" class="tray-icon-img">
          </button>
          <button class="action-control-btn btn-delete-msg" title="Purge Record">
            <img src="../assets/chat-trash.svg" alt="Delete" class="tray-icon-img">
          </button>
        </div>
      `;
    }

    layoutStructuralString = `
      <div class="msg-avatar" style="background: linear-gradient(135deg, ${getGradient(safeUsername)});">${avatarLetter}</div>
      <div class="msg-content">
        <div class="msg-top">
          <h5>${safeUsername} <span>${time}</span> ${statusBadgeHTML} ${whisperTag}</h5>
        </div>
        <p>${textContent}</p>
      </div>
      ${staticControlsTrayHTML}
    `;
  }

  div.innerHTML = layoutStructuralString;

  if (msgData.isOmoggleInvite && msgData.inviteStatus === "pending" && currentUser && currentUser.uid !== msgData.senderId) {
    const accBtn = div.querySelector(".btn-duel-accept");
    const decBtn = div.querySelector(".btn-duel-decline");
    if (accBtn) accBtn.onclick = () => updateDoc(doc(db, "whispers", msgData.id), { inviteStatus: "accepted" });
    if (decBtn) decBtn.onclick = () => updateDoc(doc(db, "whispers", msgData.id), { inviteStatus: "declined" });
  }

  const editBtn = div.querySelector(".btn-edit-msg");
  const deleteBtn = div.querySelector(".btn-delete-msg");
  const dataCollectionTargetStr = msgData.isWhisper ? "whispers" : "messages";

  if (editBtn) {
    editBtn.onclick = () => {
      const messageInput = document.getElementById("message-input");
      const sendButtonElement = document.getElementById("send-message-btn");
      
      isEditingMode = true;
      editingMessageId = msgData.id;
      editingCollectionTarget = dataCollectionTargetStr;
      
      messageInput.value = msgData.text;
      sendButtonElement.textContent = "Edit";
      
      messageInput.focus();
      messageInput.selectionStart = messageInput.selectionEnd = messageInput.value.length;
    };
  }

  /* DETECTS DELETION ACTIONS AND CACHES LOG HISTORIES FOR UNDO */
  if (deleteBtn) {
    deleteBtn.onclick = async () => {
      try {
        const targetReferenceDoc = doc(db, dataCollectionTargetStr, msgData.id);
        const existingDataSnapshot = await getDoc(targetReferenceDoc);
        if (existingDataSnapshot.exists()) {
          lastActionLog = { type: "delete", collection: dataCollectionTargetStr, id: msgData.id, data: existingDataSnapshot.data() };
        }
        await deleteDoc(targetReferenceDoc);
      } catch(err) {
        console.error("Failed to process document purge lifecycle steps:", err);
      }
    };
  }

  scroller.appendChild(div);
}

/* AUTOCOMPLETE NAVIGATION ENGINE */
function setupAutocompleteEngine(input) {
  const popover = document.getElementById("suggestions-popover");

  input.addEventListener("input", () => {
    const val = input.value;
    const selectionStart = input.selectionStart;
    
    if (!val) {
      closePopover();
      return;
    }

    const textBeforeCursor = val.substring(0, selectionStart);
    const words = textBeforeCursor.split(/\s+/);
    const currentWordIdx = words.length - 1;
    const currentWord = words[currentWordIdx];
    const wordStartIdx = textBeforeCursor.lastIndexOf(currentWord);

    if (val.startsWith("/")) {
      if (currentWordIdx === 0) {
        const clearCommands = EX_COMMANDS.filter(c => {
          if (["/mute", "/unmute", "/ban", "/unban", "/permaban", "/deleteall", "/users"].includes(c.name)) {
            return currentUserRole === "admin" || currentUserRole === "owner";
          }
          if (["/admin", "/unadmin", "/headadmin", "/unheadadmin", "/subscription", "/deleteuser"].includes(c.name)) {
            return currentUserRole === "owner";
          }
          return true;
        }).filter(c => c.name.toLowerCase().startsWith(val.toLowerCase()));

        if (clearCommands.length > 0) {
          showCommands(clearCommands);
          return;
        } else {
          closePopover();
          return;
        }
      }
    }

    const baseCommandContext = words[0].toLowerCase();
    const targetAutocompleteCommands = ["/w", "/omoggle", "/mute", "/unmute", "/admin", "/unadmin", "/headadmin", "/unheadadmin", "/subscription", "/deleteuser", "/ban", "/unban", "/permaban"];

    if (targetAutocompleteCommands.includes(baseCommandContext)) {
      let isTargetingPhase = true;

      if (["/mute", "/unmute", "/admin", "/unadmin", "/headadmin", "/unheadadmin", "/subscription", "/deleteuser", "/ban", "/unban", "/permaban"].includes(baseCommandContext) && currentWordIdx > 1) {
        isTargetingPhase = false;
      } else {
        for (let i = 1; i < currentWordIdx; i++) {
          if (!words[i].startsWith("@")) {
            isTargetingPhase = false;
            break;
          }
        }
      }

      if (isTargetingPhase) {
        let searchStr = currentWord;
        if (searchStr.startsWith("@")) {
          searchStr = searchStr.substring(1);
        }

        if (currentWord === words[0] || currentWord === "") {
          searchStr = "";
        }

        const cleanSearch = searchStr.toLowerCase();
        const filtered = localUsersCache.filter(u => 
          u.username.toLowerCase().startsWith(cleanSearch) && 
          u.username.toLowerCase() !== currentUsername.toLowerCase()
        );

        if (filtered.length > 0) {
          currentMentionTriggerIdx = wordStartIdx;
          showMentions(filtered, currentWord === words[0] ? "command-inline" : "whisper-target");
          return;
        }
      }
    }

    const lastAtIdx = val.lastIndexOf("@", selectionStart - 1);
    if (lastAtIdx !== -1 && (lastAtIdx === 0 || /\s/.test(val[lastAtIdx - 1]))) {
      const searchStr = val.substring(lastAtIdx + 1, selectionStart).toLowerCase();
      
      if (!/\s/.test(searchStr)) {
        currentMentionTriggerIdx = lastAtIdx;
        const filtered = localUsersCache.filter(u => 
          u.username.toLowerCase().startsWith(searchStr) && 
          u.username.toLowerCase() !== currentUsername.toLowerCase()
        );
        
        if (filtered.length > 0) {
          showMentions(filtered, "general-mention");
          return;
        }
      }
    }

    closePopover();
  });

  input.addEventListener("keydown", (e) => {
    const items = popover.querySelectorAll(".suggestion-item");
    if (popover.style.display === "block" && items.length > 0) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        items[activeSuggestionIndex].classList.remove("selected");
        activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
        items[activeSuggestionIndex].classList.add("selected");
        items[activeSuggestionIndex].scrollIntoView({ block: "nearest" });
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        items[activeSuggestionIndex].classList.remove("selected");
        activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
        items[activeSuggestionIndex].classList.add("selected");
        items[activeSuggestionIndex].scrollIntoView({ block: "nearest" });
      } else if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        items[activeSuggestionIndex].click();
      } else if (e.key === "Escape") {
        closePopover();
      }
    } else if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("send-message-btn").click();
    }
  });

  document.addEventListener("click", (e) => {
    if (e.target !== input && e.target !== popover && !popover.contains(e.target)) {
      closePopover();
    }
  });
}

function showCommands(cmds) {
  const popover = document.getElementById("suggestions-popover");
  activeSuggestionIndex = 0;
  popover.innerHTML = "";
  
  cmds.forEach((c, idx) => {
    const div = document.createElement("div");
    div.className = "suggestion-item" + (idx === 0 ? " selected" : "");
    div.innerHTML = `<span class="item-icon">/</span> <strong>${c.name}</strong> &nbsp; <span style="color:var(--text-muted); font-size:0.8rem;">${c.desc}</span>`;
    
    div.onclick = (e) => {
      e.stopPropagation(); 
      const input = document.getElementById("message-input");
      input.value = c.name + " ";
      input.focus();
      input.selectionStart = input.selectionEnd = input.value.length;
      closePopover();
      input.dispatchEvent(new Event("input")); 
    };
    popover.appendChild(div);
  });
  popover.style.display = "block";
}

function showMentions(users, type) {
  currentMentionType = type;
  const popover = document.getElementById("suggestions-popover");
  activeSuggestionIndex = 0;
  popover.innerHTML = "";

  users.forEach((u, idx) => {
    const div = document.createElement("div");
    div.className = "suggestion-item" + (idx === 0 ? " selected" : "");
    div.innerHTML = `
      <div class="item-avatar" style="background: linear-gradient(135deg, ${getGradient(u.username)});">${u.avatar}</div>
      <strong>@${u.username}</strong>
    `;
    
    div.onclick = (e) => {
      e.stopPropagation(); 
      const input = document.getElementById("message-input");
      const currentVal = input.value;
      let newCursorPos = 0;

      const cmdParts = currentVal.trim().split(/\s+/);
      const routingContextCmdStr = cmdParts[0];

      if (currentMentionType === "command-inline") {
        input.value = routingContextCmdStr + " @" + u.username + " ";
        newCursorPos = input.value.length;
      } else if (currentMentionType === "whisper-target") {
        const beforeWord = currentVal.substring(0, currentMentionTriggerIdx);
        let spaceAfter = currentVal.indexOf(" ", currentMentionTriggerIdx);
        let afterWord = spaceAfter !== -1 ? currentVal.substring(spaceAfter) : "";
        input.value = beforeWord + "@" + u.username + (afterWord ? afterWord : " ");
        newCursorPos = (beforeWord + "@" + u.username + " ").length;
      } else {
        const beforeTrigger = currentVal.substring(0, currentMentionTriggerIdx);
        let spaceAfter = currentVal.indexOf(" ", currentMentionTriggerIdx);
        let afterWord = spaceAfter !== -1 ? currentVal.substring(spaceAfter) : " ";
        input.value = beforeTrigger + "@" + u.username + (afterWord.startsWith(" ") ? afterWord : " " + afterWord);
        newCursorPos = (beforeTrigger + "@" + u.username + " ").length;
      }

      input.focus();
      input.selectionStart = input.selectionEnd = newCursorPos;
      closePopover();
    };
    popover.appendChild(div);
  });
  popover.style.display = "block";
}

function closePopover() {
  const popover = document.getElementById("suggestions-popover");
  popover.style.display = "none";
  popover.innerHTML = "";
}

/* HISTORICAL PAGINATION INTERACTION TRACKER */
async function handleScrollPagination() {
  const scroller = document.getElementById("message-scroller");
  
  if (scroller.scrollTop === 0 && !isLoadingMore && lastLoadedTimestamp && !allMessagesLoaded) {
    isLoadingMore = true;

    const loaderBanner = document.createElement("div");
    loaderBanner.id = "history-loading-banner";
    loaderBanner.style.cssText = "text-align: center; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; padding: 10px 0;";
    loaderBanner.textContent = "Getting more messages...";
    scroller.insertBefore(loaderBanner, scroller.firstChild);

    const initialScrollHeight = scroller.scrollHeight;

    try {
      const olderQuery = query(collection(db, "messages"), orderBy("timestamp", "desc"), startAfter(lastLoadedTimestamp), limit(20));
      const olderSnapshot = await getDocs(olderQuery);
      
      const existingBanner = document.getElementById("history-loading-banner");
      if (existingBanner) existingBanner.remove();

      if (olderSnapshot.docs.length < 20) {
        allMessagesLoaded = true;
      }

      if (olderSnapshot.docs.length > 0) {
        lastLoadedTimestamp = olderSnapshot.docs[olderSnapshot.docs.length - 1].data().timestamp;
        
        const fetchedHistorical = olderSnapshot.docs.map(doc => ({ ...doc.data(), id: doc.id, isWhisper: false }));
        dbHistoricalMessages = [...dbHistoricalMessages, ...fetchedHistorical];
        
        renderMessages();
        scroller.scrollTop = scroller.scrollHeight - initialScrollHeight;
      }
    } catch (err) {
      console.error("Error loading older messages:", err);
      const existingBanner = document.getElementById("history-loading-banner");
      if (existingBanner) existingBanner.remove();
    }
    isLoadingMore = false;
  }
}

function getGradient(username) {
  const colors = ["#3b82f6, #7c3aed", "#f97316, #ec4899", "#06b6d4, #0891b2", "#10b981, #059669", "#f59e0b, #d97706"];
  let hash = 0;
  for (let i = 0; i < username.length; i++) {
    hash = username.charCodeAt(i) + ((hash << 5) - hash);
  }
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function addLogout() {
  const container = document.getElementById('auth-button-container');
  if (!container) return;
  const a = document.createElement("a");
  a.textContent = "Logout";
  a.href = "#";
  a.className = "nav-auth-btn";
  a.id = "logout-btn";
  a.onclick = async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "../login/";
  };
  container.innerHTML = '';
  container.appendChild(a);
}
