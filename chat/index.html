<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carson Games - Chat</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; max-height: 100vh; overflow: hidden; }
    .chat-layout { display: flex; justify-content: center; align-items: stretch; height: calc(100vh - 76px); width: 100vw; overflow: hidden; background: var(--bg); }

    /* Main Chat Stream Container */
    .chat-main { width: 100%; max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; background: #090a14; overflow: hidden; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0.95rem 1.5rem; border-bottom: 1px solid var(--border); }
    .chat-meta { display: flex; align-items: center; gap: 0.75rem; }
    .channel-title { font-family: var(--font-display); font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }

    .message-scroller { flex: 1; padding: 1.4rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }

    /* Chat Message Blocks */
    .msg-block { display: flex; gap: 1rem; align-items: flex-start; transition: opacity 0.2s ease; }
    
    /* Pending/Sending status style modification */
    .msg-block.pending { opacity: 0.4; filter: brightness(0.8); }

    .msg-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--card); flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: var(--font-display); font-weight: 800; }
    .msg-content { width: 100%; }
    .msg-top { display: flex; align-items: center; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.35rem; }
    .msg-content h5 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; margin: 0; color: var(--text); }
    .msg-content h5 span { font-size: 0.75rem; color: var(--text-muted); margin-left: 8px; font-weight: 500; }
    .msg-content p { color: #cbd5e1; font-size: 0.95rem; line-height: 1.7; margin: 0; }
    .msg-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
    .reaction-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 9px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); font-size: 0.82rem; }

    /* Message Input */
    .input-container { padding: 0 1.5rem 1.5rem; }
    .input-row { display: flex; gap: 0.75rem; align-items: center; }
    .input-container .input-field { width: 100%; background: var(--surface); padding: 14px 18px; border-radius: 999px; border: 1px solid var(--border); color: var(--text); }
    .send-btn { min-width: 130px; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="#" class="active">Chat</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="chat-layout">
    <section class="chat-main">
      <div class="chat-header">
        <div class="chat-meta">
          <div class="channel-title"><span>#</span><strong>general-lobby</strong></div>
        </div>
      </div>
      <div class="message-scroller" id="message-scroller">
      </div>
      <div class="input-container">
        <div class="input-row">
          <input id="message-input" type="text" class="input-field" placeholder="Message #general-lobby...">
          <button id="send-message-btn" class="btn-primary send-btn">Send</button>
        </div>
      </div>
    </section>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  query,
  orderBy,
  limit,
  startAfter,
  getDocs,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
  authDomain: "carson-games.firebaseapp.com",
  projectId: "carson-games",
  storageBucket: "carson-games.firebasestorage.app",
  messagingSenderId: "856520252558",
  appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentUsername = "";
let lastMessageTime = 0;
const MESSAGE_COOLDOWN = 2000; // 2 seconds
let lastLoadedTimestamp = null;
let isLoadingMore = false;

// Local store to keep track of outbound messages currently mid-flight
let localPendingQueue = [];

/* AUTH CHECK (FIXED LOOP) */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.replace("../login/");
    return;
  }

  currentUser = user;
  const userRef = doc(db, "users", user.uid);
  let username = "User";

  try {
    const snap = await getDoc(userRef);

    if (snap.exists() && snap.data().username) {
      username = snap.data().username;
    } else {
      await setDoc(userRef, {
        username: user.email.split("@")[0],
        email: user.email,
        createdAt: Date.now()
      }, { merge: true });

      username = user.email.split("@")[0];
    }
  } catch (err) {
    console.error("User load error:", err);
  }

  currentUsername = username;
  startChat(user);
  addLogout();
});

/* CHAT */
function startChat(user) {
  const input = document.getElementById("message-input");
  const btn = document.getElementById("send-message-btn");
  const scroller = document.getElementById("message-scroller");

  // OPTIMIZATION: Removed loadInitialMessages() entirely. 
  // onSnapshot handles the initial data fetch automatically, saving 25 reads on every load.
  listenForNewMessages();
  scroller.addEventListener("scroll", handleScrollPagination);

  btn.onclick = async () => {
    const textToSend = input.value.trim();
    if (!textToSend) return;
    
    const now = Date.now();
    if (now - lastMessageTime < MESSAGE_COOLDOWN) {
      const remaining = Math.ceil((MESSAGE_COOLDOWN - (now - lastMessageTime)) / 1000);
      alert(`Wait ${remaining} second(s) before sending another message`);
      return;
    }

    // 1. CLEAR THE FIELD IMMEDIATELY
    input.value = "";
    lastMessageTime = now;

    // 2. CREATE CLIENT-SIDE IDENTIFIER 
    const clientSideId = "msg-" + Date.now() + Math.random().toString(36).substring(2);

    // 3. GENERATE THE VISUAL CHAT BLOCK OBJECT IN LITE MEMORY ARRAY
    const pendingMsgData = {
      text: textToSend,
      username: currentUsername,
      userId: user.uid,
      avatar: currentUsername[0].toUpperCase(),
      timestamp: null, // No official stamp yet
      isPending: true,
      clientSideId: clientSideId
    };

    // Push to the processing queue and render directly
    localPendingQueue.push(pendingMsgData);
    displayMessage(scroller, pendingMsgData);
    scroller.scrollTop = scroller.scrollHeight;

    // 4. SHIP PAYLOAD PATHWAY TO FIRESTORE
    try {
      await addDoc(collection(db, "messages"), {
        text: textToSend,
        username: currentUsername,
        userId: user.uid,
        avatar: currentUsername[0].toUpperCase(),
        timestamp: serverTimestamp(),
        clientSideId: clientSideId // Saved so we can cross reference on snapshot return
      });
    } catch (err) {
      console.error("Error sending message:", err);
      // Remove it from queue if it errors out
      localPendingQueue = localPendingQueue.filter(m => m.clientSideId !== clientSideId);
      const failedElement = document.getElementById(clientSideId);
      if(failedElement) failedElement.remove();
    }
  };

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !(e.shiftKey)) {
      e.preventDefault();
      btn.click();
    }
  });
}

function listenForNewMessages() {
  const scroller = document.getElementById("message-scroller");

  const q = query(
    collection(db, "messages"),
    orderBy("timestamp", "desc"),
    limit(50)
  );

  onSnapshot(q, (snapshot) => {
    scroller.innerHTML = "";

    const dbMessages = snapshot.docs.map(doc => doc.data()).reverse();

    // OPTIMIZATION: Set the initial baseline timestamp for pagination using the oldest document in this snapshot
    if (!lastLoadedTimestamp && snapshot.docs.length > 0) {
      const oldestDoc = snapshot.docs[snapshot.docs.length - 1];
      lastLoadedTimestamp = oldestDoc.data().timestamp;
    }

    // DEDUPLICATION LOOKUP: Drop items from memory tracking if they are confirmed saved in the DB
    const confirmedDbClientIds = new Set(dbMessages.map(m => m.clientSideId).filter(Boolean));
    localPendingQueue = localPendingQueue.filter(m => !confirmedDbClientIds.has(m.clientSideId));

    // Print all verified messages
    dbMessages.forEach(msg => {
      displayMessage(scroller, msg);
    });

    // Reprint unconfirmed local pending messages at the very bottom
    localPendingQueue.forEach(pendingMsg => {
      displayMessage(scroller, pendingMsg);
    });

    scroller.scrollTop = scroller.scrollHeight;
  });
}

function displayMessage(scroller, msgData, returnHTML = false) {
  const div = document.createElement("div");
  
  // Conditionally assign dark pending layout selector tags
  div.className = "msg-block" + (msgData.isPending ? " pending" : "");
  if(msgData.clientSideId) {
    div.id = msgData.clientSideId;
  }
  
  const time = msgData.timestamp ? new Date(msgData.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Sending...";
  
  div.innerHTML = `
    <div class="msg-avatar" style="background: linear-gradient(135deg, ${getGradient(msgData.username)});">${msgData.avatar}</div>
    <div class="msg-content">
      <div class="msg-top">
        <h5>${msgData.username} <span>${time}</span></h5>
      </div>
      <p>${escapeHtml(msgData.text)}</p>
    </div>
  `;
  
  if (returnHTML) {
    return div.innerHTML;
  }
  
  scroller.appendChild(div);
}

async function handleScrollPagination() {
  const scroller = document.getElementById("message-scroller");
  
  if (scroller.scrollTop === 0 && !isLoadingMore && lastLoadedTimestamp) {
    isLoadingMore = true;
    
    try {
      // OPTIMIZATION: Removed the extra query that pulled 25 recent items just to check timestamps.
      // We safely proceed straight to loading items older than our tracked `lastLoadedTimestamp`.
      const olderQuery = query(
        collection(db, "messages"),
        orderBy("timestamp", "desc"),
        startAfter(lastLoadedTimestamp),
        limit(25)
      );
      
      const olderSnapshot = await getDocs(olderQuery);
      const olderMessages = olderSnapshot.docs.reverse();
      
      if (olderMessages.length > 0) {
        // OPTIMIZATION: Update baseline to the oldest document inside our newly paginated set
        lastLoadedTimestamp = olderSnapshot.docs[olderSnapshot.docs.length - 1].data().timestamp;
        
        const fragment = document.createDocumentFragment();
        olderMessages.forEach(doc => {
          const div = document.createElement("div");
          div.innerHTML = displayMessage(null, doc.data(), true);
          fragment.appendChild(div);
        });
        
        scroller.insertBefore(fragment, scroller.firstChild);
      }
    } catch (err) {
      console.error("Error loading older messages:", err);
    }
    
    isLoadingMore = false;
  }
}

function getGradient(username) {
  const colors = [
    "#3b82f6, #7c3aed",
    "#f97316, #ec4899",
    "#06b6d4, #0891b2",
    "#10b981, #059669",
    "#f59e0b, #d97706"
  ];
  
  let hash = 0;
  for (let i = 0; i < username.length; i++) {
    hash = username.charCodeAt(i) + ((hash << 5) - hash);
  }
  
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

/* LOGOUT */
function addLogout() {
  const container = document.getElementById('auth-button-container');
  if (!container) return;

  const a = document.createElement("a");

  a.textContent = "Logout";
  a.href = "#";
  a.className = "nav-auth-btn";
  a.id = "logout-btn";

  a.onclick = async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "../login/";
  };

  container.innerHTML = '';
  container.appendChild(a);
}
</script>

</body>
</html>
