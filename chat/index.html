<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carson Games - Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=700&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── THEME CONFIGURATION ──────────────────────────────── */
    :root {
      --bg: #06060c;
      --surface: #0c0d19;
      --card: #121426;
      --card-hover: #181b33;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(124, 58, 237, 0.4);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --accent-blue: #3b82f6;
      --radius-m: 8px;
      --radius-l: 14px;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-display: 'Outfit', system-ui, sans-serif;
      --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ── BASE RESET ───────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      height: 100dvh; 
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    /* ── NAV BAR Component ────────────────────────────────── */
    header {
      background: rgba(12, 13, 25, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 999;
      flex-shrink: 0; 
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: var(--radius-m);
      transition: all 0.3s var(--ease);
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s var(--ease);
    }

    nav a:hover, nav a.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-auth-btn {
      background: var(--accent);
      color: #fff !important;
      padding: 8px 18px !important;
      border-radius: 999px !important;
      font-weight: 600 !important;
      font-size: 0.85rem !important;
      text-decoration: none !important;
      display: inline-block;
      transition: all 0.3s var(--ease);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
    }

    /* ── LAYOUT MECHANICS ─────────────────────────────────── */
    .chat-layout { 
      display: flex; 
      justify-content: center; 
      align-items: stretch; 
      height: calc(100dvh - 72px); 
      width: 100vw; 
      overflow: hidden; 
      background: var(--bg); 
    }

    .chat-main { 
      width: 100%; 
      max-width: 1100px; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column; 
      background: #090a14; 
      overflow: hidden; 
      position: relative; 
    }

    .chat-header { 
      padding: 0.95rem 1.5rem; 
      border-bottom: 1px solid var(--border); 
      flex-shrink: 0;
    }

    .channel-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; }

    .message-scroller { 
      flex: 1; 
      padding: 1.4rem 1.5rem; 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      overflow-y: auto; 
    }

    /* ── INLINE MODERATION ACTION INTERFACES ──────────────── */
    .msg-block { 
      display: flex; 
      gap: 1rem; 
      align-items: flex-start; 
      position: relative;
      width: 100%;
    }
    
    .msg-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
    }

    .msg-actions-panel {
      display: none;
      gap: 6px;
      margin-left: auto;
      padding-left: 10px;
    }

    .msg-block:hover .msg-actions-panel {
      display: flex;
    }

    .action-control-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .action-control-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }
    
    .action-control-btn.delete-trigger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* Minimalist Pure CSS Asset Path Graphics (No Emojis) */
    .icon-pencil {
      width: 10px;
      height: 10px;
      border: 1.5px solid currentColor;
      transform: rotate(-45deg);
      position: relative;
    }
    
    .icon-trash {
      width: 12px;
      height: 12px;
      position: relative;
      border: 1.5px solid currentColor;
      border-top: none;
      border-radius: 0 0 2px 2px;
    }
    .icon-trash::before {
      content: '';
      position: absolute;
      top: -3px; left: -1.5px; right: -1.5px;
      height: 1.5px;
      background: currentColor;
    }

    /* ── PROFILE & ROLE INTERACTION TAGS ────────────────── */
    .msg-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--card); flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: var(--font-display); font-weight: 800; }
    .msg-content { width: 100%; }
    .msg-top { display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.35rem; }
    .msg-content h5 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
    .msg-content h5 span.msg-timestamp { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }
    .msg-content p { color: #cbd5e1; font-size: 0.95rem; line-height: 1.7; }

    /* Custom Role Labels */
    .tag-admin { color: #3b82f6; font-size: 0.72rem; background: rgba(59,130,246,0.12); padding: 1px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(59,130,246,0.2); text-transform: uppercase; }
    .tag-owner { color: #f59e0b; font-size: 0.72rem; background: rgba(245,158,11,0.12); padding: 1px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(245,158,11,0.2); text-transform: uppercase; }
    .tag-whisper { color: #a855f7; font-size: 0.72rem; background: rgba(168,85,247,0.12); padding: 1px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(168,85,247,0.2); text-transform: uppercase; }
    .tag-invite { color: #6c63ff; font-size: 0.72rem; background: rgba(108,99,255,0.12); padding: 1px 6px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(108,99,255,0.2); text-transform: uppercase; }

    /* ── OMOGGLE SYSTEM NOTIFICATION CHANNELS ───────────── */
    .invite-card {
      background: #111226;
      border: 1px solid rgba(108, 99, 255, 0.2);
      border-radius: var(--radius-m);
      padding: 1rem;
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 440px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .invite-status-text { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
    .invite-buttons { display: flex; gap: 0.6rem; }
    
    .btn-accept { background: #10b981; color: white; border: none; padding: 7px 14px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
    .btn-accept:hover { background: #059669; }
    .btn-decline { background: #ef4444; color: white; border: none; padding: 7px 14px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
    .btn-decline:hover { background: #dc2626; }

    /* Input Mechanics */
    .input-container { padding: 0 1.5rem 1.5rem; position: relative; flex-shrink: 0; }
    .input-row { display: flex; gap: 0.75rem; align-items: center; }
    .input-container .input-field { width: 100%; background: var(--surface); padding: 12px 16px; border-radius: var(--radius-m); border: 1px solid var(--border); color: var(--text); outline: none; font-size: 0.9rem; }
    .input-container .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .send-btn { min-width: 130px; }
    .cooldown-text { color: #ef4444; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; padding-left: 1rem; visibility: hidden; height: 1.2rem; }

    /* Autocomplete Box */
    .suggestions-popover { position: absolute; bottom: calc(100% - 4px); left: 1.5rem; right: 1.5rem; background: #111224; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); max-height: 220px; overflow-y: auto; z-index: 10; display: none; padding: 6px 0; }
    .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: #cbd5e1; cursor: pointer; font-size: 0.9rem; }
    .suggestion-item:hover, .suggestion-item.selected { background: #232442; color: #fff; }
    .suggestion-item .item-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #fff; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="../" class="logo">CarsonGames</a>
      <nav>
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../games/">Games</a></li>
          <li><a href="../proxy/">Proxy</a></li>
          <li><a href="../omoggle/">Omoggle</a></li>
          <li><a href="#" class="active">Chat</a></li>
          <li><a href="../settings/">Settings</a></li>
          <li id="auth-button-container"></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="chat-layout">
    <section class="chat-main">
      <div class="chat-header">
        <div class="channel-title">Carson Chat</div>
      </div>
      
      <div class="message-scroller" id="message-scroller"></div>

      <div class="input-container">
        <div id="suggestions-popover" class="suggestions-popover"></div>
        <div id="cooldown-timer-text" class="cooldown-text"></div>
        
        <div class="input-row">
          <input id="message-input" type="text" class="input-field" placeholder="Type a message or use commands..." autocomplete="off">
          <button id="send-message-btn" class="btn-primary send-btn">Send</button>
        </div>
      </div>
    </section>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  updateDoc,
  deleteDoc,
  query,
  orderBy,
  limit,
  startAfter,
  getDocs,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc,
  where
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaCIfKIDu8-XcRcidBY5pTMUQJA4wZ1Ic",
  authDomain: "carson-games.firebaseapp.com",
  projectId: "carson-games",
  storageBucket: "carson-games.firebasestorage.app",
  messagingSenderId: "856520252558",
  appId: "1:856520252558:web:e89d6b835c9ffe89da3ddf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Global Command Configurations
const ALL_COMMANDS = [
  { name: "/w", desc: "Whisper privately to other users", minRole: "user" },
  { name: "/omoggle", desc: "Invite someone to a private Omoggle duel", minRole: "user" },
  { name: "/mute", desc: "Mute user (minutes). /mute @user 60", minRole: "admin" },
  { name: "/admin", desc: "Promote user to Admin", minRole: "owner" },
  { name: "/headadmin", desc: "Promote user to Head Admin (Owner)", minRole: "owner" }
];

let currentUser = null;
let currentUsername = "";
let currentUserRole = "user"; 
let currentUserMutedUntil = 0; 

let lastMessageTime = 0;
const MESSAGE_COOLDOWN = 2000; 
let lastLoadedTimestamp = null;
let isLoadingMore = false;
let initialSnapshotReceived = false; 

let dbPublicMessages = [];
let dbPrivateMessages = [];
let localPendingQueue = [];
let localUsersCache = []; 

let activeSuggestionIndex = 0;
let currentMentionTriggerIdx = -1; 
let currentMentionType = ""; 

setTimeout(() => {
  if (auth.currentUser && !initialSnapshotReceived) {
    window.location.reload();
  }
}, 2000);

/* AUTH LAYER AND ROLE SYNCING */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.replace("../login/");
    return;
  }

  currentUser = user;
  const userRef = doc(db, "users", user.uid);
  
  // Create or sync real-time user permissions
  onSnapshot(userRef, (docSnap) => {
    if (docSnap.exists()) {
      const data = docSnap.data();
      currentUsername = data.username || user.email.split("@")[0];
      currentUserRole = data.role || "user";
      currentUserMutedUntil = data.mutedUntil || 0;
    } else {
      setDoc(userRef, {
        username: user.email.split("@")[0],
        email: user.email,
        role: "user",
        createdAt: Date.now()
      }, { merge: true });
      currentUsername = user.email.split("@")[0];
      currentUserRole = "user";
    }
  });

  await startChat(user);
  addLogout();
});

function startCooldownTimer() {
  const btn = document.getElementById("send-message-btn");
  const textContainer = document.getElementById("cooldown-timer-text");
  btn.disabled = true;
  textContainer.style.visibility = "visible";

  const updateDisplay = () => {
    const elapsed = Date.now() - lastMessageTime;
    const remaining = MESSAGE_COOLDOWN - elapsed;

    if (remaining <= 0) {
      clearInterval(countdownInterval);
      btn.disabled = false;
      textContainer.style.visibility = "hidden";
    } else {
      const secondsLeft = Math.ceil(remaining / 1000);
      textContainer.textContent = `You must wait ${secondsLeft} more second${secondsLeft > 1 ? 's' : ''} to send a message`;
    }
  };
  const countdownInterval = setInterval(updateDisplay, 100);
}

/* CHAT SETUP ENGINE */
async function startChat(user) {
  const input = document.getElementById("message-input");
  const btn = document.getElementById("send-message-btn");
  const scroller = document.getElementById("message-scroller");

  listenForNewMessages(user);
  scroller.addEventListener("scroll", handleScrollPagination);
  setupAutocompleteEngine(input);

  btn.onclick = async () => {
    let textToSend = input.value.trim();
    if (!textToSend) return;
    
    // Check if muted
    if (Date.now() < currentUserMutedUntil) {
      const remainingMinutes = Math.ceil((currentUserMutedUntil - Date.now()) / 60000);
      alert(`You are muted. Remaining time: ${remainingMinutes} minute(s).`);
      return;
    }

    const now = Date.now();
    if (now - lastMessageTime < MESSAGE_COOLDOWN) return; 

    input.value = "";
    lastMessageTime = now;
    startCooldownTimer();

    // Command Parsing Vectors
    if (textToSend.startsWith("/")) {
      const tokens = textToSend.split(/\s+/);
      const cmd = tokens[0].toLowerCase();

      // Moderate Execution Blocks
      if (cmd === "/mute" && (currentUserRole === "admin" || currentUserRole === "owner")) {
        const targetName = tokens[1]?.replace("@", "");
        const minutes = parseInt(tokens[2]);
        if (!targetName || isNaN(minutes)) { alert("Usage: /mute @username minutes"); return; }
        
        const matched = localUsersCache.find(u => u.username.toLowerCase() === targetName.toLowerCase());
        if (matched) {
          await updateDoc(doc(db, "users", matched.id), { mutedUntil: Date.now() + (minutes * 60 * 1000) });
          alert(`Muted ${targetName} for ${minutes} minutes.`);
        } else { alert("User not located in local room history."); }
        return;
      }

      if (cmd === "/admin" && currentUserRole === "owner") {
        const targetName = tokens[1]?.replace("@", "");
        const matched = localUsersCache.find(u => u.username.toLowerCase() === targetName.toLowerCase());
        if (matched) {
          await updateDoc(doc(db, "users", matched.id), { role: "admin" });
          alert(`Promoted ${targetName} to Admin.`);
        }
        return;
      }

      if (cmd === "/headadmin" && currentUserRole === "owner") {
        const targetName = tokens[1]?.replace("@", "");
        const matched = localUsersCache.find(u => u.username.toLowerCase() === targetName.toLowerCase());
        if (matched) {
          await updateDoc(doc(db, "users", matched.id), { role: "owner" });
          alert(`Promoted ${targetName} to Head Admin (Owner).`);
        }
        return;
      }
    }

    const isWhisperCommand = textToSend.startsWith("/w ");
    const isOmoggleCommand = textToSend.startsWith("/omoggle ");
    let targetUsernames = [];
    let parsedText = textToSend;

    if (isWhisperCommand || isOmoggleCommand) {
      const parts = textToSend.split(/\s+/);
      let i = 1;
      while (i < parts.length && parts[i].startsWith("@")) {
        targetUsernames.push(parts[i].substring(1).toLowerCase());
        i++;
      }
      parsedText = parts.slice(i).join(" ");
    }

    const clientSideId = "msg-" + Date.now() + Math.random().toString(36).substring(2);

    const pendingMsgData = {
      text: isOmoggleCommand && !parsedText ? "Do you want to duel in Omoggle?" : parsedText,
      username: currentUsername,
      userId: user.uid,
      avatar: currentUsername[0].toUpperCase(),
      timestamp: null,
      isPending: true,
      isWhisper: targetUsernames.length > 0,
      isOmoggleInvite: isOmoggleCommand,
      inviteStatus: isOmoggleCommand ? "pending" : null,
      role: currentUserRole,
      clientSideId: clientSideId
    };

    localPendingQueue.push(pendingMsgData);
    renderMessages();

    try {
      if (targetUsernames.length > 0) {
        let participantIds = [user.uid];
        targetUsernames.forEach(uname => {
          const matchedUser = localUsersCache.find(u => u.username.toLowerCase() === uname);
          if (matchedUser && !participantIds.includes(matchedUser.id)) participantIds.push(matchedUser.id);
        });

        if (participantIds.length === 1) throw new Error("Recipient not found in room memory cache.");

        const whisperPayload = {
          text: isOmoggleCommand && !parsedText ? "Do you want to duel in Omoggle?" : parsedText,
          username: currentUsername,
          senderId: user.uid,
          avatar: currentUsername[0].toUpperCase(),
          timestamp: serverTimestamp(),
          participants: participantIds,
          role: currentUserRole,
          clientSideId: clientSideId
        };

        if (isOmoggleCommand) {
          whisperPayload.isOmoggleInvite = true;
          whisperPayload.inviteStatus = "pending";
        }

        await addDoc(collection(db, "whispers"), whisperPayload);
      } else {
        await addDoc(collection(db, "messages"), {
          text: textToSend,
          username: currentUsername,
          userId: user.uid,
          avatar: currentUsername[0].toUpperCase(),
          timestamp: serverTimestamp(),
          role: currentUserRole,
          clientSideId: clientSideId
        });
      }
    } catch (err) {
      localPendingQueue = localPendingQueue.filter(m => m.clientSideId !== clientSideId);
      renderMessages();
    }
  };
}

function updateAutocompleteCacheFromLoadedMessages() {
  const uniqueUsers = new Map();
  let allMessages = [...dbPublicMessages, ...dbPrivateMessages];
  allMessages.forEach(msg => {
    if (msg.userId && msg.username) {
      uniqueUsers.set(msg.userId, { id: msg.userId, username: msg.username, avatar: msg.avatar || msg.username[0].toUpperCase() });
    } else if (msg.senderId && msg.username) {
      uniqueUsers.set(msg.senderId, { id: msg.senderId, username: msg.username, avatar: msg.avatar || msg.username[0].toUpperCase() });
    }
  });
  localUsersCache = Array.from(uniqueUsers.values());
}

/* SYNC STREAM CHANNELS */
function listenForNewMessages(user) {
  const publicQ = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(20));
  onSnapshot(publicQ, (snapshot) => {
    initialSnapshotReceived = true; 
    dbPublicMessages = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id, isWhisper: false }));
    renderMessages();
  });

  const privateQ = query(collection(db, "whispers"), where("participants", "array-contains", user.uid));
  onSnapshot(privateQ, (snapshot) => {
    dbPrivateMessages = snapshot.docs.map(doc => {
      const data = doc.data();
      
      // Real-time private match redirection engine
      if (data.isOmoggleInvite && data.inviteStatus === "accepted") {
        setTimeout(() => {
          const myRoleType = currentUser.uid === data.senderId ? "host" : "guest";
          window.location.href = `../omoggle/?room=${doc.id}&role=${myRoleType}`;
        }, 1000);
      }
      return { ...data, id: doc.id, isWhisper: true };
    });
    renderMessages();
  });
}

function renderMessages() {
  const scroller = document.getElementById("message-scroller");
  const isPinnedToBottom = scroller.scrollHeight - scroller.clientHeight <= scroller.scrollTop + 30;

  updateAutocompleteCacheFromLoadedMessages();
  scroller.innerHTML = "";

  let allMessages = [...dbPublicMessages, ...dbPrivateMessages];
  allMessages.sort((a, b) => {
    const timeA = a.timestamp ? a.timestamp.toMillis() : Date.now();
    const timeB = b.timestamp ? b.timestamp.toMillis() : Date.now();
    return timeA - timeB;
  });

  const confirmedDbClientIds = new Set(allMessages.map(m => m.clientSideId).filter(Boolean));
  localPendingQueue = localPendingQueue.filter(m => !confirmedDbClientIds.has(m.clientSideId));

  allMessages.forEach(msg => displayMessage(scroller, msg));
  localPendingQueue.forEach(pendingMsg => displayMessage(scroller, pendingMsg));
  
  if (isPinnedToBottom || initialSnapshotReceived) {
    scroller.scrollTop = scroller.scrollHeight;
  }
}

/* RENDERING INTERACTION BLOCKS */
function displayMessage(scroller, msgData) {
  const div = document.createElement("div");
  div.className = "msg-block" + (msgData.isPending ? " pending" : "");
  
  const time = msgData.timestamp ? new Date(msgData.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Sending...";
  
  // Custom Ordered Permission Label Strings
  let roleLabelHTML = "";
  if (msgData.role === "admin") roleLabelHTML = `<span class="tag-admin">Admin</span>`;
  if (msgData.role === "owner") roleLabelHTML = `<span class="tag-owner">Owner</span>`;
  
  const whisperLabelHTML = msgData.isWhisper ? `<span class="tag-whisper">Whisper</span>` : "";

  let contentBodyHTML = "";

  if (msgData.isOmoggleInvite) {
    if (msgData.inviteStatus === "pending") {
      if (currentUser && currentUser.uid !== msgData.senderId) {
        // Recipient Private View Frame (Masked as System Notification)
        contentBodyHTML = `
          <div class="invite-card">
            <span class="invite-status-text">Challenge: Do you want to duel in Omoggle?</span>
            <div class="invite-buttons">
              <button class="btn-accept">Accept</button>
              <button class="btn-decline">Decline</button>
            </div>
          </div>
        `;
      } else {
        // Sender Private View Frame
        contentBodyHTML = `
          <div class="invite-card">
            <span class="invite-status-text">Sent Omoggle duel request to your opponent (Pending...)</span>
          </div>
        `;
      }
    } else if (msgData.inviteStatus === "accepted") {
      contentBodyHTML = `<div class="invite-card" style="border-color:#10b981;"><span class="invite-status-text" style="color:#10b981;">Duel accepted! Redirecting...</span></div>`;
    } else {
      contentBodyHTML = `<div class="invite-card" style="border-color:#ef4444;"><span class="invite-status-text" style="color:#ef4444;">Challenge declined.</span></div>`;
    }

    // Completely replace profile attributes with the automated System Server identity
    div.innerHTML = `
      <div class="msg-wrapper">
        <div class="msg-avatar" style="background:#ef4444; color:white;">S</div>
        <div class="msg-content">
          <div class="msg-top">
            <h5>Server <span class="msg-timestamp">${time}</span> <span class="tag-invite">Omoggle Duel</span></h5>
          </div>
          ${contentBodyHTML}
        </div>
      </div>
    `;
  } else {
    // Standard User Chat Stream Template Generation Frame
    let textContent = escapeHtml(msgData.text);
    textContent = textContent.replace(/@([a-zA-Z0-9_\-]+)/g, '<span style="color:#3b82f6; font-weight:600;">@$1</span>');
    
    // Check Mutation Authorizations
    let operationsPanelHTML = "";
    if (currentUser && (currentUser.uid === msgData.userId || currentUser.uid === msgData.senderId || currentUserRole === "admin" || currentUserRole === "owner")) {
      operationsPanelHTML = `
        <div class="msg-actions-panel">
          <button class="action-control-btn edit-trigger" title="Edit Content"><div class="icon-pencil"></div></button>
          <button class="action-control-btn delete-trigger" title="Remove Message"><div class="icon-trash"></div></button>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="msg-wrapper">
        <div class="msg-avatar" style="background: linear-gradient(135deg, ${getGradient(msgData.username)});">${msgData.avatar || msgData.username[0].toUpperCase()}</div>
        <div class="msg-content">
          <div class="msg-top">
            <h5>${msgData.username} <span class="msg-timestamp">${time}</span> ${roleLabelHTML} ${whisperLabelHTML}</h5>
          </div>
          <p class="text-payload-string">${textContent}</p>
        </div>
        ${operationsPanelHTML}
      </div>
    `;
  }

  // Hook Interactive Elements
  if (msgData.isOmoggleInvite && msgData.inviteStatus === "pending" && currentUser && currentUser.uid !== msgData.senderId) {
    const acc = div.querySelector(".btn-accept");
    const dec = div.querySelector(".btn-decline");
    if (acc) acc.onclick = () => setDoc(doc(db, "whispers", msgData.id), { inviteStatus: "accepted" }, { merge: true });
    if (dec) dec.onclick = () => setDoc(doc(db, "whispers", msgData.id), { inviteStatus: "declined" }, { merge: true });
  }

  // Mutation Event Listeners
  const editBtn = div.querySelector(".edit-trigger");
  const deleteBtn = div.querySelector(".delete-trigger");
  const targetCollection = msgData.isWhisper ? "whispers" : "messages";

  if (editBtn) {
    editBtn.onclick = async () => {
      const newUpdateString = prompt("Modify message text context:", msgData.text);
      if (newUpdateString && newUpdateString.trim() !== "") {
        await setDoc(doc(db, targetCollection, msgData.id), { text: newUpdateString.trim() }, { merge: true });
      }
    };
  }
  if (deleteBtn) {
    deleteBtn.onclick = async () => {
      if (confirm("Permanently erase this chat document from the stream?")) {
        await deleteDoc(doc(db, targetCollection, msgData.id));
      }
    };
  }

  scroller.appendChild(div);
}

/* AUTOCOMPLETE PREDICTION MECHANICS */
function setupAutocompleteEngine(input) {
  const popover = document.getElementById("suggestions-popover");

  input.addEventListener("input", () => {
    const val = input.value;
    if (val === "/") {
      // Role Filtering Command Menu Items
      const authorizedCmds = ALL_COMMANDS.filter(c => {
        if (c.minRole === "owner") return currentUserRole === "owner";
        if (c.minRole === "admin") return currentUserRole === "admin" || currentUserRole === "owner";
        return true;
      });
      showCommands(authorizedCmds);
      return;
    }

    const words = val.split(" ");
    const currentWord = words[words.length - 1];

    if ((words[0] === "/w" || words[0] === "/omoggle") && currentWord.startsWith("@")) {
      const searchStr = currentWord.substring(1).toLowerCase();
      const filtered = localUsersCache.filter(u => u.username.toLowerCase().startsWith(searchStr) && u.username.toLowerCase() !== currentUsername.toLowerCase());
      if (filtered.length > 0) {
        currentMentionTriggerIdx = val.lastIndexOf(currentWord);
        showMentions(filtered, words[0]);
        return;
      }
    }
    closePopover();
  });

  input.addEventListener("keydown", (e) => {
    const items = popover.querySelectorAll(".suggestion-item");
    if (popover.style.display === "block" && items.length > 0) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        items[activeSuggestionIndex].classList.remove("selected");
        activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
        items[activeSuggestionIndex].classList.add("selected");
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        items[activeSuggestionIndex].classList.remove("selected");
        activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
        items[activeSuggestionIndex].classList.add("selected");
      } else if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        items[activeSuggestionIndex].click();
      } else if (e.key === "Escape") {
        closePopover();
      }
    } else if (e.key === "Enter") {
      e.preventDefault();
      document.getElementById("send-message-btn").click();
    }
  });
}

function showCommands(cmds) {
  const popover = document.getElementById("suggestions-popover");
  activeSuggestionIndex = 0; popover.innerHTML = "";
  cmds.forEach((c, idx) => {
    const div = document.createElement("div");
    div.className = "suggestion-item" + (idx === 0 ? " selected" : "");
    div.innerHTML = `<span>/</span><strong>${c.name}</strong> &nbsp;<span style="color:var(--text-muted); font-size:0.8rem;">${c.desc}</span>`;
    div.onclick = () => {
      const input = document.getElementById("message-input");
      input.value = c.name + " "; input.focus();
      closePopover();
    };
    popover.appendChild(div);
  });
  popover.style.display = "block";
}

function showMentions(users, cmdType) {
  const popover = document.getElementById("suggestions-popover");
  activeSuggestionIndex = 0; popover.innerHTML = "";
  users.forEach((u, idx) => {
    const div = document.createElement("div");
    div.className = "suggestion-item" + (idx === 0 ? " selected" : "");
    div.innerHTML = `<div class="item-avatar" style="background:linear-gradient(135deg, ${getGradient(u.username)}">${u.avatar}</div><strong>@${u.username}</strong>`;
    div.onclick = () => {
      const input = document.getElementById("message-input");
      input.value = cmdType + " @" + u.username + " "; input.focus();
      closePopover();
    };
    popover.appendChild(div);
  });
  popover.style.display = "block";
}

function closePopover() {
  const popover = document.getElementById("suggestions-popover");
  popover.style.display = "none";
}

async function handleScrollPagination() {
  const scroller = document.getElementById("message-scroller");
  if (scroller.scrollTop === 0 && !isLoadingMore && lastLoadedTimestamp) {
    isLoadingMore = true;
    const initialHeight = scroller.scrollHeight;
    try {
      const olderQuery = query(collection(db, "messages"), orderBy("timestamp", "desc"), startAfter(lastLoadedTimestamp), limit(20));
      const snapshot = await getDocs(olderQuery);
      if (snapshot.docs.length > 0) {
        lastLoadedTimestamp = snapshot.docs[snapshot.docs.length - 1].data().timestamp;
        snapshot.docs.reverse().forEach(doc => {
          const div = document.createElement("div");
          displayMessage(div, { ...doc.data(), id: doc.id, isWhisper: false });
          scroller.insertBefore(div.firstChild, scroller.firstChild);
        });
        scroller.scrollTop = scroller.scrollHeight - initialHeight;
      }
    } catch (e) {}
    isLoadingMore = false;
  }
}

function getGradient(username) {
  const colors = ["#3b82f6, #7c3aed", "#f97316, #ec4899", "#06b6d4, #0891b2", "#10b981, #059669", "#f59e0b, #d97706"];
  let hash = 0;
  for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function addLogout() {
  const container = document.getElementById('auth-button-container');
  if (!container || document.getElementById("logout-btn")) return;
  const a = document.createElement("a");
  a.textContent = "Logout"; a.href = "#"; a.className = "nav-auth-btn"; a.id = "logout-btn";
  a.onclick = async (e) => {
    e.preventDefault(); await signOut(auth); window.location.href = "../login/";
  };
  container.appendChild(a);
}
