<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tester</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }

        /* Full Screen Responsive Split */
        #left-panel { flex: 1; display: flex; flex-direction: column; p-width: 100%; align-items: center; justify-content: space-between; padding: 15px; }
        #right-panel { width: 280px; display: flex; flex-direction: column; padding: 15px; background: #222; border-left: 2px solid #333; }

        /* Responsive Flexible Iframe Container */
        .iframe-container {
            flex: 1;
            width: 100%;
            background: #000;
            border: 3px solid #444;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
        }
        /* Forces the frame to fill the dynamic container */
        iframe { width: 100%; height: 100%; border: none; }

        /* Folder Name Banner */
        #folder-name-display {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
            background: #2d2d2d;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Control Buttons optimized for touch tapping */
        #controls { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 18px 10px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; -webkit-tap-highlight-color: transparent; }
        .btn-works { background-color: #2ec4b6; }
        .btn-buttons { background-color: #ff9f1c; }
        .btn-broken { background-color: #e71d36; }

        /* Right Panel Setup */
        .timer-section { text-align: right; margin-bottom: 20px; }
        #timer { font-size: 42px; font-weight: bold; font-family: monospace; color: #ff9f1c; }
        .timer-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 5px; }
        .timer-btn { background: #444; border: none; color: white; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        
        /* Dynamic Lists */
        .lists-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .list-box { padding: 10px; border-radius: 6px; background: #2d2d2d; flex: 1; display: flex; flex-direction: column; }
        .list-box h3 { margin-top: 0; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .list-box ul { list-style: none; padding: 0; margin: 0; overflow-y: auto; font-size: 12px; font-family: monospace; flex: 1; max-height: 120px; }
        .list-box li { padding: 4px 0; border-bottom: 1px solid #383838; color: #ccc; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div class="iframe-container">
            <iframe id="game-frame" sandbox="allow-scripts allow-same-origin" src=""></iframe>
        </div>
        
        <div id="folder-name-display">Connecting...</div>
        
        <div id="controls">
            <button class="btn btn-works" onclick="submitStatus('works')">Works</button>
            <button class="btn btn-buttons" onclick="submitStatus('needs buttons')">Needs Buttons</button>
            <button class="btn btn-broken" onclick="submitStatus('not working')">Not Working</button>
        </div>
    </div>

    <div id="right-panel">
        <div class="timer-section">
            <div id="timer">0:15</div>
            <div class="timer-btns">
                <button class="timer-btn" onclick="pauseTimer()">Pause</button>
                <button class="timer-btn" onclick="unpauseTimer()">Unpause</button>
            </div>
        </div>

        <div class="lists-container">
            <div class="list-box" style="border-left: 4px solid #2ec4b6;">
                <h3 style="color: #2ec4b6;">Works</h3>
                <ul id="list-works"></ul>
            </div>
            <div class="list-box" style="border-left: 4px solid #ff9f1c;">
                <h3 style="color: #ff9f1c;">Needs Buttons</h3>
                <ul id="list-buttons"></ul>
            </div>
            <div class="list-box" style="border-left: 4px solid #e71d36;">
                <h3 style="color: #e71d36;">Not Working</h3>
                <ul id="list-broken"></ul>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const GITHUB_USERNAME = "jkisveryscary"; 
        const REPO_NAME = "carsongames";             
        // =================================================

        let gameFolders = [];
        let currentIndex = 0;
        let timeLeft = 15;
        let timerId = null;
        let isPaused = false;
        
        let savedProgress = JSON.parse(localStorage.getItem('arcadeQAResults')) || {};

        async function fetchFoldersFromGitHub() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/play`;
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("API Failure");
                const data = await response.json();
                
                gameFolders = data
                    .filter(item => item.type === "dir")
                    .map(item => item.name)
                    .sort();
                
                if (gameFolders.length === 0) {
                    document.getElementById('folder-name-display').innerText = "No games found in /play/";
                    return;
                }
                initDashboard();
            } catch (error) {
                console.error(error);
                document.getElementById('folder-name-display').innerText = "API Error. Check setup.";
            }
        }

        function initDashboard() {
            currentIndex = gameFolders.findIndex(folder => !savedProgress[folder]);
            if (currentIndex === -1) {
                alert("Testing complete! Restarting from top.");
                currentIndex = 0;
            }
            updateListsUI();
            loadGame();
        }

        function loadGame() {
            if (currentIndex >= gameFolders.length) {
                document.getElementById('folder-name-display').innerText = "🎉 All Done!";
                document.getElementById('game-frame').src = "";
                clearInterval(timerId);
                return;
            }

            const activeGame = gameFolders[currentIndex];
            document.getElementById('folder-name-display').innerText = `../play/${activeGame}/ (${currentIndex + 1}/${gameFolders.length})`;
            document.getElementById('game-frame').src = `../play/${activeGame}/`;
            
            resetTimer();
        }

        function startTimer() {
            clearInterval(timerId);
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        submitStatus('not working'); 
                    }
                }
            }, 1000);
        }

        function resetTimer() {
            timeLeft = 15;
            document.getElementById('timer').innerText = "0:15";
            isPaused = false;
            startTimer();
        }

        function pauseTimer() { isPaused = true; }
        function unpauseTimer() { isPaused = false; }

        function submitStatus(status) {
            if (gameFolders.length === 0) return;
            const currentFolder = gameFolders[currentIndex];
            savedProgress[currentFolder] = status;
            localStorage.setItem('arcadeQAResults', JSON.stringify(savedProgress));
            updateListsUI();
            currentIndex++;
            loadGame();
        }

        function updateListsUI() {
            document.getElementById('list-works').innerHTML = "";
            document.getElementById('list-buttons').innerHTML = "";
            document.getElementById('list-broken').innerHTML = "";

            for (const [folder, status] of Object.entries(savedProgress)) {
                const li = document.createElement('li');
                li.innerText = folder;
                if (status === 'works') document.getElementById('list-works').appendChild(li);
                else if (status === 'needs buttons') document.getElementById('list-buttons').appendChild(li);
                else if (status === 'not working') document.getElementById('list-broken').appendChild(li);
            }
        }

        window.onload = fetchFoldersFromGitHub;
    </script>
</body>
</html>
